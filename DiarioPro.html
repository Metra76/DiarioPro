<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#1A47B8"/>
<title>DiarioPro</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1A47B8;--blue2:#1e53d4;--blue3:#3b6fe8;
  --blueDim:rgba(26,71,184,0.13);--blueGlow:rgba(26,71,184,0.4);
  --accent:#60a5fa;--bg:#0c1524;--bg2:#111e31;--bg3:#172540;--bg4:#1c2d4e;
  --card:#152038;--border:rgba(255,255,255,0.07);--borderBlue:rgba(26,71,184,0.3);
  --text:#dce8ff;--text2:#8aabda;--text3:#4d709e;
  --green:#34d399;--greenDim:rgba(52,211,153,0.12);
  --red:#f87171;--redDim:rgba(248,113,113,0.12);
  --yellow:#fbbf24;--yellowDim:rgba(251,191,36,0.12);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:12px;--rs:8px;--tabH:60px;--hdrH:56px;
  --safeb:env(safe-area-inset-bottom,0px);
}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overscroll-behavior:none;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--borderBlue);border-radius:3px;}
input,textarea,select{font-family:var(--sans);outline:none;border:none;background:none;}
button{cursor:pointer;font-family:var(--sans);border:none;outline:none;background:none;}
.shell{display:flex;flex-direction:column;height:100%;}
.hdr{height:var(--hdrH);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0;}
.logo{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue3));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.68rem;letter-spacing:.04em;color:#fff;flex-shrink:0;box-shadow:0 0 14px var(--blueGlow);}
.hdr h1{font-size:.95rem;font-weight:600;letter-spacing:-.01em;}
.hdr p{font-size:.65rem;color:var(--text3);margin-top:1px;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px calc(var(--tabH) + var(--safeb) + 14px);}
.tabbar{height:calc(var(--tabH) + var(--safeb));padding-bottom:var(--safeb);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;position:fixed;bottom:0;left:0;right:0;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text3);font-size:.55rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:color .15s;position:relative;}
.tab.on{color:var(--accent);}
.tab.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2px;background:var(--accent);border-radius:0 0 3px 3px;}
.tab-ico{font-size:1rem;line-height:1;}
.fab{position:fixed;bottom:calc(var(--tabH) + var(--safeb) + 14px);right:14px;width:50px;height:50px;border-radius:50%;background:var(--blue);color:#fff;font-size:1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px var(--blueGlow);z-index:90;transition:transform .12s;}
.fab:active{transform:scale(.92);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;}
.cp{padding:13px 14px;}
.row{display:flex;align-items:center;gap:8px;}
.col{display:flex;flex-direction:column;}
.slabel{font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 15px;border-radius:var(--rs);font-size:.78rem;font-weight:600;transition:all .12s;cursor:pointer;}
.btnp{background:var(--blue);color:#fff;box-shadow:0 2px 10px var(--blueGlow);}
.btnp:active{background:var(--blue2);}
.btng{background:var(--blueDim);color:var(--accent);border:1px solid var(--borderBlue);}
.btng:active{background:rgba(26,71,184,.25);}
.btnd{background:var(--redDim);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.bsm{padding:5px 11px;font-size:.7rem;}
.bxs{padding:3px 8px;font-size:.65rem;}
.bico{width:30px;height:30px;border-radius:var(--rs);padding:0;font-size:.85rem;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:.65rem;font-weight:600;color:var(--text3);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;color:var(--text);font-size:.84rem;transition:border-color .15s;}
.fi:focus{border-color:var(--blue3);}
.fi::placeholder{color:var(--text3);}
textarea.fi{resize:vertical;min-height:68px;line-height:1.5;}
select.fi option{background:var(--bg2);}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;}
.overlay.ctr{align-items:center;padding:16px;}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:sup .22s cubic-bezier(.32,.72,0,1);}
.modal.ctr{border-radius:var(--r);animation:fup .2s ease;}
.mh{width:32px;height:3px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.mhdr{padding:14px 14px 0;display:flex;align-items:center;justify-content:space-between;}
.mtit{font-size:.95rem;font-weight:700;}
.mcls{width:26px;height:26px;border-radius:50%;background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:.75rem;cursor:pointer;}
.mbody{padding:14px;}
.mfoot{display:flex;gap:8px;padding:0 14px 14px;}
.mfoot .btn{flex:1;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.6rem;font-weight:700;letter-spacing:.04em;}
.bb{background:var(--blueDim);color:var(--accent);}
.bg{background:var(--greenDim);color:var(--green);}
.by{background:var(--yellowDim);color:var(--yellow);}
.br{background:var(--redDim);color:var(--red);}
.li{display:flex;align-items:center;gap:9px;padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.li:last-child{border-bottom:none;}
.li:active{background:var(--bg3);}
.li-m{flex:1;min-width:0;}
.li-t{font-size:.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-s{font-size:.68rem;color:var(--text2);margin-top:2px;}
.chk{width:21px;height:21px;border-radius:5px;border:1.5px solid var(--borderBlue);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer;}
.chk.on{background:var(--green);border-color:var(--green);color:#0c1524;font-size:.7rem;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px;}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center;}
.sv{font-family:var(--mono);font-size:1.05rem;font-weight:600;}
.sl{font-size:.58rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cname{text-align:center;font-size:.58rem;font-weight:600;color:var(--text3);padding:3px 0;letter-spacing:.04em;}
.cday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:.76rem;font-weight:500;cursor:pointer;position:relative;transition:background .12s;}
.cday:active{background:var(--bg3);}
.cday.tod{background:var(--blueDim);color:var(--accent);font-weight:700;}
.cday.sel{background:var(--blue)!important;color:#fff;}
.cday.dot::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--accent);}
.cday.sel.dot::after{background:rgba(255,255,255,.7);}
.cday.dim{color:var(--text3);}
.ocard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.ocard:active{border-color:var(--borderBlue);}
.ohdr{padding:12px 13px;display:flex;align-items:center;gap:10px;}
.odot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.oname{font-size:.9rem;font-weight:600;flex:1;}
.ometa{font-size:.68rem;color:var(--text2);margin-top:2px;}
.oh{font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--accent);}
.srow{padding:9px 13px 9px 31px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .12s;}
.srow:active{background:var(--bg3);}
.sname{flex:1;font-size:.8rem;font-weight:500;}
.smeta{font-size:.65rem;color:var(--text3);}
.sh{font-family:var(--mono);font-size:.85rem;font-weight:600;color:var(--accent);}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 13px;}
.gimg{aspect-ratio:1;border-radius:var(--rs);background:var(--bg3);object-fit:cover;width:100%;border:1px solid var(--border);cursor:pointer;}
.gadd{aspect-ratio:1;border-radius:var(--rs);background:var(--bg3);border:1px dashed var(--borderBlue);display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;color:var(--text3);transition:all .12s;}
.gadd:active{background:var(--bg4);}
.entrada{display:flex;align-items:flex-start;gap:8px;padding:9px 13px;border-bottom:1px solid var(--border);}
.entrada:last-child{border-bottom:none;}
.ef{font-family:var(--mono);font-size:.65rem;color:var(--text3);min-width:36px;padding-top:2px;}
.em{flex:1;min-width:0;}
.eo{font-size:.82rem;font-weight:500;}
.es{font-size:.68rem;color:var(--text2);margin-top:1px;}
.eh{font-family:var(--mono);font-size:.95rem;font-weight:700;color:var(--accent);}
.ac{position:absolute;left:0;right:0;top:100%;background:var(--bg2);border:1px solid var(--borderBlue);border-radius:0 0 var(--rs) var(--rs);z-index:300;max-height:160px;overflow-y:auto;box-shadow:0 8px 20px rgba(0,0,0,.4);}
.aci{padding:9px 12px;font-size:.82rem;cursor:pointer;transition:background .1s;}
.aci:hover,.aci:active{background:var(--bg3);}
.opchip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;margin-bottom:6px;}
.empty{text-align:center;padding:36px 20px;color:var(--text3);}
.eico{font-size:2.2rem;margin-bottom:8px;opacity:.45;}
.empty p{font-size:.8rem;}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--borderBlue);border-radius:var(--rs);padding:9px 15px;font-size:.78rem;font-weight:500;color:var(--text);z-index:999;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:fupa .2s ease;}
@keyframes fup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fupa{from{opacity:0;transform:translateY(8px) translateX(-50%);}to{opacity:1;transform:translateY(0) translateX(-50%);}}
@keyframes sup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.fu{animation:fup .28s ease both;}
.fu1{animation:fup .28s .05s ease both;}
.fu2{animation:fup .28s .1s ease both;}
.fu3{animation:fup .28s .15s ease both;}
.fu4{animation:fup .28s .2s ease both;}
@media(min-width:600px){.content,.tabbar{max-width:580px;}.content{margin:0 auto;}.tabbar{left:50%;transform:translateX(-50%);}.fab{right:calc(50% - 290px + 14px);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;
const LS={get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},};
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=(d)=>{if(!d)return'';const[y,m,dy]=d.split('-');return`${dy}/${m}/${y}`;};
const fmtDS=(d)=>{if(!d)return'';const[,m,dy]=d.split('-');return`${dy}/${m}`;};
const fmtDL=(d)=>{if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});};
const mname=(y,m)=>new Date(y,m,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
const getDIM=(y,m)=>new Date(y,m+1,0).getDate();
const getFirst=(y,m)=>{let d=new Date(y,m,1).getDay();return d===0?6:d-1;};
const dym=(d)=>d?d.slice(0,7):'';
const nowT=()=>new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
const nowD=()=>new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});

async function reqNotif(){if(!('Notification' in window))return false;if(Notification.permission==='granted')return true;return(await Notification.requestPermission())==='granted';}
function schedNotif(ev){if(!('Notification' in window)||Notification.permission!=='granted')return;const t=new Date(ev.fecha+'T'+(ev.hora||'09:00')).getTime()-Date.now()-((ev.aviso||15)*60000);if(t>0)setTimeout(()=>new Notification('DiarioPro',{body:ev.titulo,tag:ev.id}),t);}

function generarPDF(obraName,subobraName,entradas,operariosExtra){
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const W=210,P=18;
  doc.setFillColor(26,71,184);doc.rect(0,0,W,26,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(18);doc.text('PARTE DE TRABAJO',P,16);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text('Fecha: '+fmtD(today()),W-P,11,{align:'right'});
  let y=34;
  doc.setFillColor(232,240,255);doc.roundedRect(P,y,W-P*2,20,2,2,'F');
  doc.setTextColor(26,71,184);doc.setFont('helvetica','bold');doc.setFontSize(8);doc.text('OBRA',P+4,y+6);
  doc.setTextColor(20,20,20);doc.setFont('helvetica','normal');doc.setFontSize(11);doc.text(obraName+(subobraName?' — '+subobraName:''),P+4,y+14);
  y+=26;
  const sorted=[...entradas].sort((a,b)=>a.fecha>b.fecha?1:-1);
  const fi=sorted[0]?.fecha||today(),ff=sorted[sorted.length-1]?.fecha||today();
  const tH=entradas.reduce((s,e)=>s+(parseFloat(e.horas)||0),0);
  const dias=[...new Set(entradas.map(e=>e.fecha))].length;
  [[fmtD(fi)+' → '+fmtD(ff),'PERIODO'],[String(dias),'DÍAS'],[tH+'h','TOTAL HORAS']].forEach(([v,l],i)=>{
    const x=P+i*((W-P*2)/3),cw=(W-P*2)/3;
    doc.setFillColor(245,248,255);doc.rect(x,y,cw,14,'F');doc.setDrawColor(200,215,245);doc.rect(x,y,cw,14,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(26,71,184);doc.text(l,x+3,y+5);
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20,20,20);doc.text(v,x+3,y+12);
  });
  y+=20;doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,71,184);doc.text('JORNADAS',P,y);y+=4;
  doc.autoTable({startY:y,head:[['Fecha','Horas','Notas']],body:sorted.map(e=>[fmtD(e.fecha),e.horas+'h',e.notas||'']),margin:{left:P,right:P},styles:{fontSize:9,cellPadding:3.5,textColor:[20,20,20]},headStyles:{fillColor:[26,71,184],textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},alternateRowStyles:{fillColor:[248,251,255]},columnStyles:{0:{cellWidth:30},1:{cellWidth:20,halign:'center'},2:{cellWidth:'auto'}},});
  y=doc.lastAutoTable.finalY+8;
  const opRows=[['Juan (JCM)',tH+'h','Encargado'],...(operariosExtra||[]).map(o=>[o.nombre,o.horas+'h','Operario'])];
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,71,184);doc.text('OPERARIOS',P,y);y+=4;
  doc.autoTable({startY:y,head:[['Nombre','Horas','Rol']],body:opRows,margin:{left:P,right:P},styles:{fontSize:9,cellPadding:3.5,textColor:[20,20,20]},headStyles:{fillColor:[26,71,184],textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},alternateRowStyles:{fillColor:[248,251,255]},columnStyles:{0:{cellWidth:'auto'},1:{cellWidth:20,halign:'center'},2:{cellWidth:28}},});
  y=doc.lastAutoTable.finalY+8;
  const trabajos=entradas.map(e=>e.trabajos).filter(Boolean).join('\n');
  const mats=entradas.map(e=>e.materiales).filter(Boolean).join('\n');
  if(trabajos){doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,71,184);doc.text('TRABAJOS REALIZADOS',P,y);y+=4;doc.setFillColor(248,251,255);doc.setDrawColor(200,215,245);const ls=doc.splitTextToSize(trabajos,W-P*2-6);const h2=Math.max(14,ls.length*5+8);doc.roundedRect(P,y,W-P*2,h2,2,2,'FD');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(20,20,20);doc.text(ls,P+3,y+6);y+=h2+6;}
  if(mats){doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,71,184);doc.text('MATERIALES',P,y);y+=4;doc.setFillColor(248,251,255);doc.setDrawColor(200,215,245);const ls=doc.splitTextToSize(mats,W-P*2-6);const h2=Math.max(14,ls.length*5+8);doc.roundedRect(P,y,W-P*2,h2,2,2,'FD');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(20,20,20);doc.text(ls,P+3,y+6);}
  doc.setFillColor(26,71,184);doc.rect(0,283,W,10,'F');doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(180,200,255);doc.text('DiarioPro — Juan (JCM)',W/2,289,{align:'center'});
  doc.save('Parte_'+obraName.replace(/\s+/g,'_')+(subobraName?'_'+subobraName.replace(/\s+/g,'_'):'')+'.pdf');
}

function Toast({msg,onDone}){useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);return <div className="toast">{msg}</div>;}
function Confirm({msg,onOk,onCancel}){return(<div className="overlay ctr" onClick={onCancel}><div className="modal ctr" style={{padding:18}} onClick={e=>e.stopPropagation()}><p style={{fontSize:'.86rem',lineHeight:1.5,marginBottom:14}}>{msg}</p><div className="row"><button className="btn btng" style={{flex:1}} onClick={onCancel}>Cancelar</button><button className="btn btnd" style={{flex:1}} onClick={onOk}>Eliminar</button></div></div></div>);}

function AcInput({value,onChange,suggestions=[],placeholder}){
  const [open,setOpen]=useState(false);
  const filtered=(suggestions||[]).filter(s=>s&&s.toLowerCase().includes((value||'').toLowerCase())&&s!==value).slice(0,7);
  return(<div style={{position:'relative'}}>
    <input className="fi" value={value||''} placeholder={placeholder} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),160)}/>
    {open&&filtered.length>0&&(<div className="ac">{filtered.map(s=>(<div key={s} className="aci" onMouseDown={()=>{onChange(s);setOpen(false);}}>{s}</div>))}</div>)}
  </div>);
}

// ── HOY ───────────────────────────────────────────────────────────────────────
function Hoy({eventos,tareas,horas,onNav}){
  const hoy=today();
  const evH=eventos.filter(e=>e.fecha===hoy).sort((a,b)=>a.hora>b.hora?1:-1);
  const tarP=tareas.filter(t=>!t.done&&(t.fecha===hoy||!t.fecha));
  const hMes=(()=>{const m=hoy.slice(0,7);return horas.filter(h=>h.fecha&&h.fecha.startsWith(m)).reduce((s,h)=>s+(parseFloat(h.horas)||0),0);})();
  const hSem=(()=>{const d=new Date(),lun=new Date(d);lun.setDate(d.getDate()-((d.getDay()+6)%7));const ini=lun.toISOString().slice(0,10);return horas.filter(h=>h.fecha>=ini).reduce((s,h)=>s+(parseFloat(h.horas)||0),0);})();
  return(<div>

        {evH.length===0?<div style={{fontSize:'.75rem',color:'var(--text3)'}}>Sin eventos hoy</div>

// ── AGENDA ────────────────────────────────────────────────────────────────────
function Agenda({eventos,setEventos,showToast}){
  const hoy=today(),now=new Date();
  const [vy,setVy]=useState(now.getFullYear());
  const [vm,setVm]=useState(now.getMonth());
  const [sel,setSel]=useState(hoy);
  const [form,setForm]=useState(null);
  const [del,setDel]=useState(null);
  const CATS=['Trabajo','Personal','Gestión','Médico','Otro'];
  const AVISS=[{v:0,l:'Sin aviso'},{v:15,l:'15 min'},{v:30,l:'30 min'},{v:60,l:'1 hora'},{v:1440,l:'1 día'}];
  function buildCal(){const first=getFirst(vy,vm),days=getDIM(vy,vm),prev=getDIM(vy,vm-1);const cells=[];for(let i=first-1;i>=0;i--)cells.push({day:prev-i,cur:false,date:''});for(let d=1;d<=days;d++){const mm=String(vm+1).padStart(2,'0'),dd=String(d).padStart(2,'0');cells.push({day:d,cur:true,date:`${vy}-${mm}-${dd}`});}while(cells.length%7)cells.push({day:0,cur:false,date:''});return cells;}
  const cells=buildCal();
  const evD=new Set(eventos.map(e=>e.fecha));
  const dayEvs=eventos.filter(e=>e.fecha===sel).sort((a,b)=>a.hora>b.hora?1:-1);
  const pm=()=>{if(vm===0){setVm(11);setVy(y=>y-1);}else setVm(m=>m-1);};
  const nm=()=>{if(vm===11){setVm(0);setVy(y=>y+1);}else setVm(m=>m+1);};
  function save(){if(!form?.titulo?.trim())return;let upd;if(form.id){upd=eventos.map(e=>e.id===form.id?form:e);}else{const ne={...form,id:uid()};upd=[...eventos,ne];schedNotif(ne);}setEventos(upd);LS.set('dp_ev',upd);setForm(null);showToast('Evento guardado');}
  function del2(){const upd=eventos.filter(e=>e.id!==del);setEventos(upd);LS.set('dp_ev',upd);setDel(null);showToast('Eliminado');}
  return(<div>
    <div className="row fu" style={{marginBottom:10,justifyContent:'space-between'}}>
      <button className="btn btng bsm bico" onClick={pm}>‹</button>
      <span style={{fontSize:'.86rem',fontWeight:600,textTransform:'capitalize'}}>{mname(vy,vm)}</span>
      <button className="btn btng bsm bico" onClick={nm}>›</button>
    </div>
    <div className="card cp fu1">
      <div className="cgrid" style={{marginBottom:6}}>
        {['Lu','Ma','Mi','Ju','Vi','Sá','Do'].map(d=><div key={d} className="cname">{d}</div>)}
        {cells.map((c,i)=>(<div key={i} className={`cday${!c.cur?' dim':''}${c.date===hoy?' tod':''}${c.date===sel?' sel':''}${evD.has(c.date)?' dot':''}`} onClick={()=>c.cur&&c.date&&setSel(c.date)}>{c.day||''}</div>))}
      </div>
    </div>
    <div className="fu2">
      <div className="row" style={{margin:'10px 0 7px'}}><span className="slabel" style={{flex:1,textTransform:'capitalize'}}>{fmtDL(sel)}</span><button className="btn btnp bsm" onClick={()=>setForm({titulo:'',fecha:sel,hora:'09:00',lugar:'',cat:'Trabajo',aviso:15,notas:''})}>+ Evento</button></div>
      {dayEvs.length===0?<div className="empty"><div className="eico">📅</div><p>Sin eventos este día</p></div>
        :<div className="card" style={{padding:0}}>{dayEvs.map(e=>(<div key={e.id} className="li" onClick={()=>setForm({...e})}>
          <span style={{fontFamily:'var(--mono)',fontSize:'.68rem',color:'var(--accent)',minWidth:36}}>{e.hora}</span>
          <div className="li-m"><div className="li-t">{e.titulo}</div>{e.lugar&&<div className="li-s">📍 {e.lugar}</div>}</div>
          <span className={`badge ${e.cat==='Personal'?'bg':e.cat==='Médico'?'br':e.cat==='Gestión'?'by':'bb'}`}>{e.cat}</span>
          <button className="btn btng bxs bico" onClick={ev=>{ev.stopPropagation();setDel(e.id);}}>🗑</button>
        </div>))}</div>
      }
    </div>
    <div className="fab" onClick={()=>setForm({titulo:'',fecha:sel,hora:'09:00',lugar:'',cat:'Trabajo',aviso:15,notas:''})}>+</div>
    {form&&(<div className="overlay" onClick={()=>setForm(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="mhdr"><span className="mtit">{form.id?'Editar evento':'Nuevo evento'}</span><span className="mcls" onClick={()=>setForm(null)}>✕</span></div>
      <div className="mbody">
        <div className="field"><label>Título *</label><input className="fi" value={form.titulo} onChange={e=>setForm(v=>({...v,titulo:e.target.value}))} placeholder="Ej. Revisión ISDIN"/></div>
        <div className="fr2"><div className="field"><label>Fecha</label><input type="date" className="fi" value={form.fecha} onChange={e=>setForm(v=>({...v,fecha:e.target.value}))}/></div><div className="field"><label>Hora</label><input type="time" className="fi" value={form.hora} onChange={e=>setForm(v=>({...v,hora:e.target.value}))}/></div></div>
        <div className="fr2"><div className="field"><label>Categoría</label><select className="fi" value={form.cat} onChange={e=>setForm(v=>({...v,cat:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div><div className="field"><label>Aviso</label><select className="fi" value={form.aviso} onChange={e=>setForm(v=>({...v,aviso:+e.target.value}))}>{AVISS.map(a=><option key={a.v} value={a.v}>{a.l}</option>)}</select></div></div>
        <div className="field"><label>Lugar</label><input className="fi" value={form.lugar||''} onChange={e=>setForm(v=>({...v,lugar:e.target.value}))} placeholder="Dirección o lugar"/></div>
        <div className="field"><label>Notas</label><textarea className="fi" value={form.notas||''} onChange={e=>setForm(v=>({...v,notas:e.target.value}))} placeholder="Notas adicionales..."/></div>
      </div>
      <div className="mfoot"><button className="btn btng" onClick={()=>setForm(null)}>Cancelar</button><button className="btn btnp" onClick={save}>Guardar</button></div>
    </div></div>)}
    {del&&<Confirm msg="¿Eliminar este evento?" onOk={del2} onCancel={()=>setDel(null)}/>}
  </div>);
}

// ── TAREAS ────────────────────────────────────────────────────────────────────
function Tareas({tareas,setTareas,showToast}){
  const [filtro,setFiltro]=useState('Todas');
  const [form,setForm]=useState(null);
  const [del,setDel]=useState(null);
  const [showD,setShowD]=useState(false);
  const TIPOS=['Ir a','Pedir material','Hacer'];
  const PRIOS=['Alta','Media','Baja'];
  const FLTRS=['Todas','Ir a','Pedir material','Hacer'];
  const pC={Alta:'var(--red)',Media:'var(--yellow)',Baja:'var(--text3)'};
  const activas=tareas.filter(t=>!t.done);
  const hechas=tareas.filter(t=>t.done);
  const filtered=activas.filter(t=>filtro==='Todas'||t.tipo===filtro).sort((a,b)=>({Alta:0,Media:1,Baja:2}[a.prio]-{Alta:0,Media:1,Baja:2}[b.prio]));
  function save(){if(!form?.titulo?.trim())return;let upd;if(form.id){upd=tareas.map(t=>t.id===form.id?form:t);}else{upd=[{...form,id:uid(),done:false},...tareas];}setTareas(upd);LS.set('dp_tar',upd);setForm(null);showToast('Tarea guardada');}
  function toggle(id){const upd=tareas.map(t=>t.id===id?{...t,done:!t.done}:t);setTareas(upd);LS.set('dp_tar',upd);}
  function del2(){const upd=tareas.filter(t=>t.id!==del);setTareas(upd);LS.set('dp_tar',upd);setDel(null);showToast('Eliminada');}
  return(<div>
    <div className="row fu" style={{gap:5,overflowX:'auto',paddingBottom:4,marginBottom:11}}>
      {FLTRS.map(f=>(<button key={f} onClick={()=>setFiltro(f)} style={{whiteSpace:'nowrap',padding:'5px 11px',borderRadius:20,fontSize:'.7rem',fontWeight:600,flexShrink:0,background:filtro===f?'var(--blue)':'var(--bg3)',color:filtro===f?'#fff':'var(--text2)',border:`1px solid ${filtro===f?'var(--blue)':'var(--border)'}`}}>{f}</button>))}
    </div>
    {filtered.length===0?<div className="empty fu1"><div className="eico">✅</div><p>Sin tareas en esta categoría</p></div>
      :<div className="card fu1" style={{padding:0}}>{filtered.map(t=>(<div key={t.id} className="li" onClick={()=>setForm({...t})}>
        <div className="chk" onClick={e=>{e.stopPropagation();toggle(t.id);}}>
          <span style={{fontSize:'.7rem'}}>{t.tipo==='Ir a'?'📍':t.tipo==='Pedir material'?'📦':'·'}</span>
        </div>
        <div className="li-m"><div className="li-t">{t.titulo}</div><div className="row" style={{gap:5,marginTop:2}}><span style={{fontSize:'.62rem',color:'var(--text3)'}}>{t.tipo}</span>{t.fecha&&<span style={{fontFamily:'var(--mono)',fontSize:'.6rem',color:'var(--text3)'}}>· {fmtDS(t.fecha)}</span>}{t.notas&&<span style={{fontSize:'.6rem',color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:70}}>· {t.notas}</span>}</div></div>
        <div style={{width:7,height:7,borderRadius:'50%',background:pC[t.prio],flexShrink:0}}/>
        <button className="btn btng bxs bico" onClick={e=>{e.stopPropagation();setDel(t.id);}}>🗑</button>
      </div>))}</div>
    }
    {hechas.length>0&&(<div className="fu2" style={{marginTop:10}}>
      <button className="btn btng" style={{width:'100%',justifyContent:'space-between'}} onClick={()=>setShowD(v=>!v)}><span>Completadas ({hechas.length})</span><span>{showD?'▲':'▼'}</span></button>
      {showD&&<div className="card" style={{padding:0,marginTop:6,opacity:.6}}>{hechas.map(t=>(<div key={t.id} className="li"><div className="chk on" onClick={()=>toggle(t.id)}>✓</div><div className="li-m"><div className="li-t" style={{textDecoration:'line-through',color:'var(--text3)'}}>{t.titulo}</div></div><button className="btn btng bxs bico" onClick={()=>setDel(t.id)}>🗑</button></div>))}</div>}
    </div>)}
    <div className="fab" onClick={()=>setForm({titulo:'',tipo:'Hacer',prio:'Media',fecha:'',notas:''})}>+</div>
    {form&&(<div className="overlay" onClick={()=>setForm(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="mhdr"><span className="mtit">{form.id?'Editar':'Nueva tarea'}</span><span className="mcls" onClick={()=>setForm(null)}>✕</span></div>
      <div className="mbody">
        <div className="field"><label>Descripción *</label><input className="fi" value={form.titulo} onChange={e=>setForm(v=>({...v,titulo:e.target.value}))} placeholder="¿Qué hay que hacer?"/></div>
        <div className="fr2"><div className="field"><label>Tipo</label><select className="fi" value={form.tipo} onChange={e=>setForm(v=>({...v,tipo:e.target.value}))}>{TIPOS.map(t=><option key={t}>{t}</option>)}</select></div><div className="field"><label>Prioridad</label><select className="fi" value={form.prio} onChange={e=>setForm(v=>({...v,prio:e.target.value}))}>{PRIOS.map(p=><option key={p}>{p}</option>)}</select></div></div>
        <div className="field"><label>Fecha límite</label><input type="date" className="fi" value={form.fecha||''} onChange={e=>setForm(v=>({...v,fecha:e.target.value}))}/></div>
        <div className="field"><label>Notas</label><textarea className="fi" value={form.notas||''} onChange={e=>setForm(v=>({...v,notas:e.target.value}))} placeholder="Proveedor, cantidad, dirección..."/></div>
      </div>
      <div className="mfoot"><button className="btn btng" onClick={()=>setForm(null)}>Cancelar</button><button className="btn btnp" onClick={save}>Guardar</button></div>
    </div></div>)}
    {del&&<Confirm msg="¿Eliminar esta tarea?" onOk={del2} onCancel={()=>setDel(null)}/>}
  </div>);
}

// ── OBRAS ─────────────────────────────────────────────────────────────────────
function Obras({horas,setHoras,obras,setObras,showToast}){
  const [vista,setVista]=useState('obras');
  const [obraAct,setObraAct]=useState(null);
  const [subobraAct,setSubobraAct]=useState(null);
  const [formH,setFormH]=useState(null);
  const [formPDF,setFormPDF]=useState(null);
  const [fotoM,setFotoM]=useState(null);
  const [del,setDel]=useState(null);
  const [filtroM,setFiltroM]=useState('');

  const obraNames=useMemo(()=>[...new Set([...horas.map(h=>h.obra),...obras.map(o=>o.nombre)].filter(Boolean))].sort(),[horas,obras]);
  const subNames=useMemo(()=>{if(!obraAct)return[];return[...new Set(horas.filter(h=>h.obra===obraAct.nombre).map(h=>h.subobra).filter(Boolean))].sort();},[horas,obraAct]);

  const obraGrps=useMemo(()=>{
    const map={};
    horas.forEach(h=>{const k=h.obra||'Sin obra';if(!map[k])map[k]={nombre:k,totalH:0,entradas:[],ultima:''};map[k].totalH+=parseFloat(h.horas)||0;map[k].entradas.push(h);if(h.fecha>map[k].ultima)map[k].ultima=h.fecha;});
    obras.forEach(o=>{if(!map[o.nombre])map[o.nombre]={nombre:o.nombre,totalH:0,entradas:[],ultima:'',meta:o};else map[o.nombre].meta=o;});
    return Object.values(map).sort((a,b)=>b.ultima>a.ultima?1:-1);
  },[horas,obras]);

  const subGrps=useMemo(()=>{
    if(!obraAct)return[];const map={};
    horas.filter(h=>h.obra===obraAct.nombre).forEach(h=>{const k=h.subobra||'';if(!map[k])map[k]={nombre:k,totalH:0,entradas:[],primera:'',ultima:''};map[k].totalH+=parseFloat(h.horas)||0;map[k].entradas.push(h);if(!map[k].primera||h.fecha<map[k].primera)map[k].primera=h.fecha;if(h.fecha>map[k].ultima)map[k].ultima=h.fecha;});
    return Object.values(map).sort((a,b)=>b.ultima>a.ultima?1:-1);
  },[horas,obraAct]);

  const subE=useMemo(()=>{
    if(!obraAct||subobraAct===null)return[];
    let e=horas.filter(h=>h.obra===obraAct.nombre&&(h.subobra||'')===(subobraAct||''));
    if(filtroM)e=e.filter(h=>dym(h.fecha)===filtroM);
    return e.sort((a,b)=>b.fecha>a.fecha?1:-1);
  },[horas,obraAct,subobraAct,filtroM]);

  const obraFotos=useMemo(()=>{if(!obraAct)return[];const ob=obras.find(o=>o.nombre===obraAct.nombre);return ob?.fotos||[];},[obras,obraAct]);

  const mesesSub=useMemo(()=>{if(!obraAct||subobraAct===null)return[];return[...new Set(horas.filter(h=>h.obra===obraAct.nombre&&(h.subobra||'')===(subobraAct||'')).map(h=>dym(h.fecha)).filter(Boolean))].sort((a,b)=>b>a?1:-1);},[horas,obraAct,subobraAct]);

  function saveH(){
    if(!formH?.obra?.trim()||!formH?.horas)return;
    const oN=formH.obra.trim();
    if(!obras.find(o=>o.nombre===oN)){const nO=[...obras,{id:uid(),nombre:oN,estado:'Activa',fotos:[],createdAt:today()}];setObras(nO);LS.set('dp_obs',nO);}
    let upd;if(formH.id){upd=horas.map(h=>h.id===formH.id?formH:h);}else{upd=[{...formH,id:uid()},...horas];}
    setHoras(upd);LS.set('dp_hor',upd);setFormH(null);showToast('Horas guardadas ✓');
    if(obraAct)setObraAct(prev=>({...prev,totalH:upd.filter(h=>h.obra===prev.nombre).reduce((s,h)=>s+(parseFloat(h.horas)||0),0),entradas:upd.filter(h=>h.obra===prev.nombre)}));
  }
  function delH(){const upd=horas.filter(h=>h.id!==del);setHoras(upd);LS.set('dp_hor',upd);setDel(null);showToast('Eliminado');}

  function addFoto(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{const foto={id:uid(),data:ev.target.result,nombre:file.name,fecha:today()};const upd=obras.map(o=>o.nombre===obraAct.nombre?{...o,fotos:[...(o.fotos||[]),foto]}:o);setObras(upd);LS.set('dp_obs',upd);showToast('Foto añadida ✓');};r.readAsDataURL(file);}
  function delFoto(fid){const upd=obras.map(o=>o.nombre===obraAct.nombre?{...o,fotos:(o.fotos||[]).filter(f=>f.id!==fid)}:o);setObras(upd);LS.set('dp_obs',upd);setFotoM(null);showToast('Foto eliminada');}

  function abrirPDF(sub){const ents=horas.filter(h=>h.obra===obraAct.nombre&&(h.subobra||'')===(sub||''));setFormPDF({obraName:obraAct.nombre,subobraName:sub,entradas:ents,ops:[]});}

  const FormHoras=()=>(<div className="overlay" onClick={()=>setFormH(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="mh"/><div className="mhdr"><span className="mtit">{formH.id?'Editar entrada':'Nueva entrada'}</span><span className="mcls" onClick={()=>setFormH(null)}>✕</span></div>
    <div className="mbody">
      <div className="fr2"><div className="field" style={{marginBottom:0}}><label>Fecha</label><input type="date" className="fi" value={formH.fecha} onChange={e=>setFormH(v=>({...v,fecha:e.target.value}))}/></div><div className="field" style={{marginBottom:0}}><label>Horas</label><input type="number" className="fi" min="0" max="24" step="0.5" value={formH.horas} onChange={e=>setFormH(v=>({...v,horas:e.target.value}))}/></div></div>
      <div style={{height:11}}/>
      <div className="field"><label>Obra *</label><AcInput value={formH.obra} onChange={v=>setFormH(f=>({...f,obra:v}))} suggestions={obraNames} placeholder="Torre Puig, ISDIN, Exea..."/></div>
      <div className="field"><label>Subobra / Referencia</label><AcInput value={formH.subobra||''} onChange={v=>setFormH(f=>({...f,subobra:v}))} suggestions={subNames} placeholder="Planta 3, HDMI, Vestíbulo..."/></div>
      <div className="field"><label>Notas</label><input className="fi" value={formH.notas||''} onChange={e=>setFormH(v=>({...v,notas:e.target.value}))} placeholder="Descripción rápida..."/></div>
      <div className="field"><label>Trabajos <span style={{fontWeight:400,color:'var(--text3)',textTransform:'none'}}>(para PDF cuando toque)</span></label><textarea className="fi" value={formH.trabajos||''} onChange={e=>setFormH(v=>({...v,trabajos:e.target.value}))} placeholder="Detalle para parte oficial..." style={{minHeight:52}}/></div>
      <div className="field"><label>Materiales <span style={{fontWeight:400,color:'var(--text3)',textTransform:'none'}}>(para PDF cuando toque)</span></label><textarea className="fi" value={formH.materiales||''} onChange={e=>setFormH(v=>({...v,materiales:e.target.value}))} placeholder="Lista de materiales..." style={{minHeight:44}}/></div>
    </div>
    <div className="mfoot"><button className="btn btng" onClick={()=>setFormH(null)}>Cancelar</button><button className="btn btnp" onClick={saveH}>Guardar</button></div>
  </div></div>);

  const FormPDFModal=()=>{
    const [f,setF]=useState(formPDF);const [newOp,setNewOp]=useState({nombre:'',horas:''});
    function addOp(){if(!newOp.nombre.trim()||!newOp.horas)return;setF(v=>({...v,ops:[...v.ops,{...newOp,id:uid()}]}));setNewOp({nombre:'',horas:''});}
    function remOp(id){setF(v=>({...v,ops:v.ops.filter(o=>o.id!==id)}));}
    const tH=f.entradas.reduce((s,e)=>s+(parseFloat(e.horas)||0),0);
    return(<div className="overlay" onClick={()=>setFormPDF(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="mhdr"><span className="mtit">Generar PDF parte</span><span className="mcls" onClick={()=>setFormPDF(null)}>✕</span></div>
      <div className="mbody">
        <div className="card cp" style={{marginBottom:11,background:'var(--bg3)'}}>
          <div style={{fontSize:'.84rem',fontWeight:600}}>{f.obraName}{f.subobraName?' — '+f.subobraName:''}</div>
          <div style={{fontSize:'.7rem',color:'var(--text2)',marginTop:3}}>{f.entradas.length} entradas · {tH}h totales</div>
        </div>
        <div className="slabel" style={{marginBottom:7}}>Operarios adicionales</div>
        {f.ops.map(o=>(<div key={o.id} className="opchip"><span style={{flex:1,fontSize:'.8rem',fontWeight:500}}>{o.nombre}</span><span style={{fontFamily:'var(--mono)',fontSize:'.8rem',color:'var(--accent)',minWidth:32}}>{o.horas}h</span><span style={{color:'var(--text3)',cursor:'pointer',padding:'2px 5px',fontSize:'.75rem'}} onClick={()=>remOp(o.id)}>✕</span></div>))}
        <div className="row" style={{gap:6,marginBottom:4}}>
          <input className="fi" value={newOp.nombre} onChange={e=>setNewOp(v=>({...v,nombre:e.target.value}))} placeholder="Nombre operario" style={{flex:1}}/>
          <input type="number" className="fi" value={newOp.horas} onChange={e=>setNewOp(v=>({...v,horas:e.target.value}))} placeholder="h" style={{width:52}}/>
          <button className="btn btng bsm" onClick={addOp}>+</button>
        </div>
      </div>
      <div className="mfoot"><button className="btn btng" onClick={()=>setFormPDF(null)}>Cancelar</button><button className="btn btnp" onClick={()=>{generarPDF(f.obraName,f.subobraName,f.entradas,f.ops);showToast('PDF generado ✓');setFormPDF(null);}}>Generar PDF ↓</button></div>
    </div></div>);
  };

  if(vista==='obras')return(<div>
    <div className="row fu" style={{marginBottom:11,justifyContent:'space-between'}}>
      <span className="slabel">Obras ({obraGrps.length})</span>
      <button className="btn btnp bsm" onClick={()=>setFormH({obra:'',subobra:'',fecha:today(),horas:8,notas:'',trabajos:'',materiales:''})}>+ Horas</button>
    </div>
    {obraGrps.length===0?<div className="empty fu1"><div className="eico">🏗️</div><p>Sin obras registradas aún</p></div>
      :obraGrps.map((og,i)=>(<div key={og.nombre} className={`ocard fu${Math.min(i+1,4)}`} onClick={()=>{setObraAct(og);setVista('obra');}}>
        <div className="ohdr">
          <div className="odot" style={{background:og.meta?.estado==='Finalizada'?'var(--text3)':'var(--green)'}}/>
          <div style={{flex:1}}><div className="oname">{og.nombre}</div><div className="ometa">{og.entradas.length} entradas · {og.ultima?fmtDS(og.ultima):'—'}</div></div>
          <div className="oh">{og.totalH.toFixed(0)}h</div>
        </div>
      </div>))
    }
    <div className="fab" onClick={()=>setFormH({obra:'',subobra:'',fecha:today(),horas:8,notas:'',trabajos:'',materiales:''})}>+</div>
    {formH&&<FormHoras/>}
  </div>);

  if(vista==='obra'&&obraAct)return(<div>
    <button className="btn btng bsm fu" style={{marginBottom:10}} onClick={()=>{setVista('obras');setObraAct(null);}}>← Obras</button>
    <div className="card cp fu1">
      <div className="row" style={{marginBottom:4}}>
        <div style={{flex:1}}><div style={{fontSize:'.98rem',fontWeight:700}}>{obraAct.nombre}</div><div style={{fontSize:'.7rem',color:'var(--text2)',marginTop:2}}>{obraAct.entradas.length} entradas · {obraAct.totalH.toFixed(0)}h totales</div></div>
        <button className="btn btnp bsm" onClick={()=>setFormH({obra:obraAct.nombre,subobra:'',fecha:today(),horas:8,notas:'',trabajos:'',materiales:''})}>+ Horas</button>
      </div>
    </div>
    <div className="slabel fu2" style={{marginBottom:7}}>Subobras</div>
    {subGrps.length===0?<div className="empty"><div className="eico">📋</div><p>Sin entradas aún</p></div>
      :<div className="card fu2" style={{padding:0}}>{subGrps.map(sub=>(<div key={sub.nombre} className="srow" onClick={()=>{setSubobraAct(sub.nombre);setVista('subobra');}}>
        <div style={{flex:1}}><div className="sname">{sub.nombre||<span style={{color:'var(--text3)',fontStyle:'italic'}}>Sin subobra</span>}</div><div className="smeta">{sub.entradas.length} días · {fmtDS(sub.primera)} → {fmtDS(sub.ultima)}</div></div>
        <div className="sh">{sub.totalH.toFixed(0)}h</div>
        <button className="btn btng bxs" style={{marginLeft:6}} onClick={e=>{e.stopPropagation();abrirPDF(sub.nombre);}}>PDF</button>
      </div>))}</div>
    }
    <div className="slabel fu3" style={{marginTop:14,marginBottom:7}}>Fotos y planos</div>
    <div className="card fu3" style={{padding:0}}>
      <div className="gallery">
        {obraFotos.map(f=>(<img key={f.id} src={f.data} className="gimg" alt={f.nombre} onClick={()=>setFotoM(f)}/>))}
        <label className="gadd">📷<input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={addFoto}/></label>
      </div>
    </div>
    {formH&&<FormHoras/>}
    {formPDF&&<FormPDFModal/>}
    {fotoM&&(<div className="overlay ctr" onClick={()=>setFotoM(null)}><div style={{position:'relative',maxWidth:'100%'}} onClick={e=>e.stopPropagation()}>
      <img src={fotoM.data} style={{maxWidth:'100%',maxHeight:'72vh',borderRadius:'var(--r)',objectFit:'contain'}} alt=""/>
      <button className="btn btnd bsm" style={{position:'absolute',top:8,right:8}} onClick={()=>delFoto(fotoM.id)}>🗑 Eliminar</button>
    </div></div>)}
  </div>);

  if(vista==='subobra'&&obraAct)return(<div>
    <button className="btn btng bsm fu" style={{marginBottom:10}} onClick={()=>{setVista('obra');setSubobraAct(null);setFiltroM('');}}>← {obraAct.nombre}</button>
    <div className="card cp fu1">
      <div className="row">
        <div style={{flex:1}}><div style={{fontSize:'.9rem',fontWeight:700}}>{subobraAct||<span style={{fontStyle:'italic',color:'var(--text2)'}}>Sin subobra</span>}</div><div style={{fontSize:'.7rem',color:'var(--text2)',marginTop:1}}>{obraAct.nombre}</div></div>
        <div className="col" style={{alignItems:'flex-end',gap:5}}>
          <div style={{fontFamily:'var(--mono)',fontSize:'1.3rem',fontWeight:700,color:'var(--accent)'}}>{subE.reduce((s,h)=>s+(parseFloat(h.horas)||0),0).toFixed(0)}h</div>
          <button className="btn btng bxs" onClick={()=>abrirPDF(subobraAct)}>PDF ↓</button>
        </div>
      </div>
    </div>
    {mesesSub.length>1&&(<div className="row fu2" style={{gap:5,overflowX:'auto',paddingBottom:4,marginBottom:9}}>
      <button onClick={()=>setFiltroM('')} style={{whiteSpace:'nowrap',padding:'4px 10px',borderRadius:20,fontSize:'.68rem',fontWeight:600,flexShrink:0,background:!filtroM?'var(--blue)':'var(--bg3)',color:!filtroM?'#fff':'var(--text2)',border:`1px solid ${!filtroM?'var(--blue)':'var(--border)'}`}}>Todo</button>
      {mesesSub.map(m=>(<button key={m} onClick={()=>setFiltroM(m)} style={{whiteSpace:'nowrap',padding:'4px 10px',borderRadius:20,fontSize:'.68rem',fontWeight:600,flexShrink:0,textTransform:'capitalize',background:filtroM===m?'var(--blue)':'var(--bg3)',color:filtroM===m?'#fff':'var(--text2)',border:`1px solid ${filtroM===m?'var(--blue)':'var(--border)'}`}}>{new Date(m+'-01T12:00:00').toLocaleDateString('es-ES',{month:'short',year:'2-digit'})}</button>))}
    </div>)}
    {subE.length===0?<div className="empty fu2"><div className="eico">📋</div><p>Sin entradas</p></div>
      :<div className="card fu2" style={{padding:0}}>{subE.map(h=>(<div key={h.id} className="entrada" onClick={()=>setFormH({...h})}>
        <div className="ef">{fmtDS(h.fecha)}</div>
        <div className="em"><div className="eo">{h.notas||<span style={{color:'var(--text3)',fontStyle:'italic'}}>Sin notas</span>}</div>{(h.trabajos||h.materiales)&&<div className="es">{[h.trabajos,h.materiales].filter(Boolean).join(' · ').slice(0,65)}</div>}</div>
        <div className="col" style={{alignItems:'flex-end',gap:4}}>
          <div className="eh">{h.horas}h</div>
          <button className="btn btng bxs bico" style={{fontSize:'.6rem'}} onClick={e=>{e.stopPropagation();setDel(h.id);}}>🗑</button>
        </div>
      </div>))}</div>
    }
    <div className="fab" onClick={()=>setFormH({obra:obraAct.nombre,subobra:subobraAct,fecha:today(),horas:8,notas:'',trabajos:'',materiales:''})}>+</div>
    {formH&&<FormHoras/>}
    {formPDF&&<FormPDFModal/>}
    {del&&<Confirm msg="¿Eliminar esta entrada?" onOk={delH} onCancel={()=>setDel(null)}/>}
  </div>);
  return null;
}

// ── CONFIG ────────────────────────────────────────────────────────────────────
function Config({eventos,tareas,horas,obras,setEventos,setTareas,setHoras,setObras,showToast}){
  const [notif,setNotif]=useState(()=>typeof Notification!=='undefined'&&Notification.permission==='granted');
  async function activar(){const ok=await reqNotif();setNotif(ok);showToast(ok?'Notificaciones activadas ✓':'Permiso denegado');}
  function exportar(){const d={eventos,tareas,horas,obras,v:2,at:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`DiarioPro_backup_${today()}.json`;a.click();URL.revokeObjectURL(u);showToast('Backup exportado ✓');}
  function importar(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.eventos){setEventos(d.eventos);LS.set('dp_ev',d.eventos);}if(d.tareas){setTareas(d.tareas);LS.set('dp_tar',d.tareas);}if(d.horas){setHoras(d.horas);LS.set('dp_hor',d.horas);}if(d.obras){setObras(d.obras);LS.set('dp_obs',d.obras);}showToast('Datos importados ✓');}catch{showToast('Error al importar');}};r.readAsText(f);}
  const total=eventos.length+tareas.length+horas.length+obras.length;
  return(<div>
    <div className="card cp fu"><div className="slabel" style={{marginBottom:9}}>Datos almacenados</div><div className="stats" style={{marginBottom:0}}><div className="stat"><div className="sv">{eventos.length}</div><div className="sl">Eventos</div></div><div className="stat"><div className="sv">{tareas.length}</div><div className="sl">Tareas</div></div><div className="stat"><div className="sv">{horas.length}</div><div className="sl">Entradas h.</div></div></div></div>
    <div className="card cp fu1"><div className="slabel" style={{marginBottom:9}}>Notificaciones push</div><div className="row" style={{justifyContent:'space-between'}}><div><div style={{fontSize:'.84rem',fontWeight:500}}>{notif?'✅ Activadas':'⛔ Desactivadas'}</div><div style={{fontSize:'.67rem',color:'var(--text3)',marginTop:2}}>Avisos de eventos de la agenda</div></div>{!notif&&<button className="btn btnp bsm" onClick={activar}>Activar</button>}</div></div>
    <div className="card cp fu2"><div className="slabel" style={{marginBottom:9}}>Backup</div><div className="col" style={{gap:8}}><button className="btn btng" style={{width:'100%'}} onClick={exportar}>⬇ Exportar JSON ({total} registros)</button><label className="btn btng" style={{width:'100%',cursor:'pointer'}}>⬆ Importar JSON<input type="file" accept=".json" style={{display:'none'}} onChange={importar}/></label></div></div>
    <div className="card cp fu3" style={{textAlign:'center'}}><div style={{fontFamily:'var(--mono)',fontSize:'.7rem',color:'var(--text3)',lineHeight:2}}>DiarioPro v2.0<br/>Juan (JCM) · M.A.<br/>Grup Ese Dos · Badalona</div></div>
  </div>);
}

// ── APP ───────────────────────────────────────────────────────────────────────
const TABS=[{ico:'📅',lbl:'Agenda'},{ico:'✅',lbl:'Tareas'},{ico:'🏗️',lbl:'Obras'},{ico:'⚙️',lbl:'Config'}];
const SUBS=['Calendario y eventos','Pendientes','Horas y partes','Configuración'];

function App(){
  const [tab,setTab]=useState(0);
  const [home,setHome]=useState(true);
  const [eventos,setEventos]=useState(()=>LS.get('dp_ev',[]));
  const [tareas,setTareas]=useState(()=>LS.get('dp_tar',[]));
  const [horas,setHoras]=useState(()=>LS.get('dp_hor',[]));
  const [obras,setObras]=useState(()=>LS.get('dp_obs',[]));
  const [toast,setToast]=useState(null);
  const [tick,setTick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setTick(v=>v+1),60000);return()=>clearInterval(t);},[]);
  function showToast(msg){setToast(msg);}
  function goTab(i){setTab(i);setHome(false);}
  return(<div className="shell">
    <div className="hdr">
      <div className="logo" style={{cursor:home?'default':'pointer'}} onClick={()=>setHome(true)}>M.A.</div>
      <div style={{flex:1}}><h1>{home?'DiarioPro':TABS[tab].lbl}</h1><p>{home?'Panel principal':SUBS[tab]}</p></div>
      <div style={{fontFamily:'var(--mono)',fontSize:'.62rem',color:'var(--text3)',textAlign:'right',lineHeight:1.6}}>{nowD()}<br/>{nowT()}</div>
    </div>
    <div className="content">
      {home&&<Hoy eventos={eventos} tareas={tareas} horas={horas} onNav={goTab}/>}
      {!home&&tab===0&&<Agenda eventos={eventos} setEventos={setEventos} showToast={showToast}/>}
      {!home&&tab===1&&<Tareas tareas={tareas} setTareas={setTareas} showToast={showToast}/>}
      {!home&&tab===2&&<Obras horas={horas} setHoras={setHoras} obras={obras} setObras={setObras} showToast={showToast}/>}
      {!home&&tab===3&&<Config eventos={eventos} tareas={tareas} horas={horas} obras={obras} setEventos={setEventos} setTareas={setTareas} setHoras={setHoras} setObras={setObras} showToast={showToast}/>}
    </div>
    <div className="tabbar">
      <div className={`tab${home?' on':''}`} onClick={()=>setHome(true)}><span className="tab-ico">🏠</span><span>Hoy</span></div>
      {TABS.map((t,i)=>(<div key={i} className={`tab${!home&&tab===i?' on':''}`} onClick={()=>goTab(i)}><span className="tab-ico">{t.ico}</span><span>{t.lbl}</span></div>))}
    </div>
    {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
