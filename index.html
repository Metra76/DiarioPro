<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --blue:#1A47B8;--blue2:#1e53d4;--blue3:#3b6fe8;
  --blueDim:rgba(26,71,184,0.13);--blueGlow:rgba(26,71,184,0.4);
  --accent:#60a5fa;--bg:#0c1524;--bg2:#111e31;--bg3:#172540;--bg4:#1c2d4e;
  --card:#152038;--border:rgba(255,255,255,0.07);--borderBlue:rgba(26,71,184,0.3);
  --text:#dce8ff;--text2:#8aabda;--text3:#4d709e;
  --green:#34d399;--greenDim:rgba(52,211,153,0.12);
  --red:#f87171;--redDim:rgba(248,113,113,0.12);
  --yellow:#fbbf24;--yellowDim:rgba(251,191,36,0.12);
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  --r:12px;--rs:8px;--tabH:60px;--hdrH:56px;
  --safeb:env(safe-area-inset-bottom,0px);--safet:env(safe-area-inset-top,0px);
}
html,body,#root{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overscroll-behavior:none;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--borderBlue);border-radius:3px;}
input,textarea,select{font-family:var(--sans);outline:none;border:none;background:none;}
button{cursor:pointer;font-family:var(--sans);border:none;outline:none;background:none;}
.shell{display:flex;flex-direction:column;height:100%;}
.hdr{height:calc(var(--hdrH) + var(--safet));padding-top:var(--safet);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding-left:16px;padding-right:16px;gap:10px;flex-shrink:0;}
.logo{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue3));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.68rem;letter-spacing:.04em;color:#fff;flex-shrink:0;box-shadow:0 0 14px var(--blueGlow);}
.hdr h1{font-size:.95rem;font-weight:600;letter-spacing:-.01em;}
.hdr p{font-size:.65rem;color:var(--text3);margin-top:1px;}
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 14px calc(var(--tabH) + var(--safeb) + 14px);}
.tabbar{height:calc(var(--tabH) + var(--safeb));padding-bottom:var(--safeb);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;position:fixed;bottom:0;left:0;right:0;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--text3);font-size:.52rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;transition:color .15s;position:relative;}
.tab.on{color:var(--accent);}
.tab.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:2px;background:var(--accent);border-radius:0 0 3px 3px;}
.tab-ico{font-size:.95rem;line-height:1;}
.fab{position:fixed;bottom:calc(var(--tabH) + var(--safeb) + 14px);right:14px;width:50px;height:50px;border-radius:50%;background:var(--blue);color:#fff;font-size:1.5rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px var(--blueGlow);z-index:90;transition:transform .12s;}
.fab:active{transform:scale(.92);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;}
.cp{padding:13px 14px;}
.row{display:flex;align-items:center;gap:8px;}
.col{display:flex;flex-direction:column;}
.slabel{font-size:.6rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 15px;border-radius:var(--rs);font-size:.78rem;font-weight:600;transition:all .12s;cursor:pointer;}
.btnp{background:var(--blue);color:#fff;box-shadow:0 2px 10px var(--blueGlow);}
.btnp:active{background:var(--blue2);}
.btng{background:var(--blueDim);color:var(--accent);border:1px solid var(--borderBlue);}
.btng:active{background:rgba(26,71,184,.25);}
.btnd{background:var(--redDim);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.bsm{padding:5px 11px;font-size:.7rem;}
.bxs{padding:3px 8px;font-size:.65rem;}
.bico{width:30px;height:30px;border-radius:var(--rs);padding:0;font-size:.85rem;}
.field{margin-bottom:11px;}
.field label{display:block;font-size:.65rem;font-weight:600;color:var(--text3);margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;color:var(--text);font-size:.84rem;transition:border-color .15s;}
.fi:focus{border-color:var(--blue3);}
.fi::placeholder{color:var(--text3);}
textarea.fi{resize:vertical;min-height:68px;line-height:1.5;}
select.fi option{background:var(--bg2);}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;}
.overlay.ctr{align-items:center;padding:16px;}
.modal{background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-height:92vh;overflow-y:auto;animation:sup .22s cubic-bezier(.32,.72,0,1);}
.modal.ctr{border-radius:var(--r);animation:fup .2s ease;}
.mh{width:32px;height:3px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.mhdr{padding:14px 14px 0;display:flex;align-items:center;justify-content:space-between;}
.mtit{font-size:.95rem;font-weight:700;}
.mcls{width:26px;height:26px;border-radius:50%;background:var(--bg3);color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:.75rem;cursor:pointer;}
.mbody{padding:14px;}
.mfoot{display:flex;gap:8px;padding:0 14px 14px;}
.mfoot .btn{flex:1;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:.6rem;font-weight:700;}
.bb{background:var(--blueDim);color:var(--accent);}
.bg2c{background:var(--greenDim);color:var(--green);}
.by{background:var(--yellowDim);color:var(--yellow);}
.br{background:var(--redDim);color:var(--red);}
.li{display:flex;align-items:center;gap:9px;padding:11px 13px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.li:last-child{border-bottom:none;}
.li:active{background:var(--bg3);}
.li-m{flex:1;min-width:0;}
.li-t{font-size:.84rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-s{font-size:.68rem;color:var(--text2);margin-top:2px;}
.chk{width:21px;height:21px;border-radius:5px;border:1.5px solid var(--borderBlue);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;cursor:pointer;}
.chk.on{background:var(--green);border-color:var(--green);color:#0c1524;font-size:.7rem;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:11px;}
.stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:10px;text-align:center;}
.sv{font-family:var(--mono);font-size:1.05rem;font-weight:600;}
.sl{font-size:.58rem;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}
/* Calendar */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cname{text-align:center;font-size:.58rem;font-weight:600;color:var(--text3);padding:3px 0;}
.cday{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:.76rem;font-weight:500;cursor:pointer;position:relative;transition:background .12s;user-select:none;}
.cday:active{background:var(--bg3);}
.cday.tod{background:var(--blueDim);color:var(--accent);font-weight:700;}
.cday.sel{background:var(--blue)!important;color:#fff;}
.cday.dot::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:3px;height:3px;border-radius:50%;background:var(--accent);}
.cday.sel.dot::after{background:rgba(255,255,255,.7);}
.cday.dim{color:var(--text3);}
.cday.gym{color:var(--green);font-weight:600;}
.cday.festivo{color:var(--red);font-weight:600;}
.cday.sel.festivo{color:#fff;}
.cday.sel.gym{color:#fff;}
/* Obras */
.ocard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:9px;overflow:hidden;cursor:pointer;transition:border-color .15s;}
.ocard:active{border-color:var(--borderBlue);}
.ohdr{padding:12px 13px;display:flex;align-items:center;gap:10px;}
.odot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.oname{font-size:.9rem;font-weight:600;flex:1;}
.ometa{font-size:.68rem;color:var(--text2);margin-top:2px;}
.oh{font-family:var(--mono);font-size:1.1rem;font-weight:700;color:var(--accent);}
.wrow{padding:10px 13px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s;}
.wrow:active{background:var(--bg3);}
.wavatar{width:28px;height:28px;border-radius:50%;background:var(--bg4);border:1px solid var(--borderBlue);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:var(--accent);flex-shrink:0;}
.srow{padding:9px 13px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .12s;}
.srow:active{background:var(--bg3);}
.entrada{display:flex;align-items:flex-start;gap:8px;padding:9px 13px;border-bottom:1px solid var(--border);}
.entrada:last-child{border-bottom:none;}
.ef{font-family:var(--mono);font-size:.65rem;color:var(--text3);min-width:36px;padding-top:2px;}
.em{flex:1;min-width:0;}
.eo{font-size:.82rem;font-weight:500;}
.es{font-size:.68rem;color:var(--text2);margin-top:1px;}
.eh{font-family:var(--mono);font-size:.95rem;font-weight:700;color:var(--accent);}
/* Gallery */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 13px;}
.gimg{aspect-ratio:1;border-radius:var(--rs);background:var(--bg3);object-fit:cover;width:100%;border:1px solid var(--border);cursor:pointer;}
.gadd{aspect-ratio:1;border-radius:var(--rs);background:var(--bg3);border:1px dashed var(--borderBlue);display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;color:var(--text3);}
/* Autocomplete */
.ac{position:absolute;left:0;right:0;top:100%;background:var(--bg2);border:1px solid var(--borderBlue);border-radius:0 0 var(--rs) var(--rs);z-index:300;max-height:160px;overflow-y:auto;box-shadow:0 8px 20px rgba(0,0,0,.4);}
.aci{padding:9px 12px;font-size:.82rem;cursor:pointer;}
.aci:active{background:var(--bg3);}
.opchip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:7px 10px;margin-bottom:6px;}
/* Tarea bloc */
.tbloc{background:var(--bg3);border-left:3px solid var(--accent);border-radius:0 var(--rs) var(--rs) 0;padding:9px 11px;margin-bottom:7px;cursor:pointer;transition:background .12s;}
.tbloc:active{background:var(--bg4);}
.tbloc-t{font-size:.82rem;font-weight:500;}
.tbloc-s{font-size:.66rem;color:var(--text3);margin-top:2px;}
/* Chart */
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:80px;padding:0 4px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;}
.bar-lbl{font-size:.5rem;color:var(--text3);text-align:center;white-space:nowrap;overflow:hidden;}
.bar-val{font-size:.52rem;font-family:var(--mono);color:var(--text2);}
/* Clima */
.clima-card{background:linear-gradient(135deg,var(--bg3),var(--bg4));border:1px solid var(--borderBlue);border-radius:var(--r);padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
/* Week view */
.week-grid{display:grid;grid-template-columns:44px repeat(7,1fr);gap:0;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;margin-bottom:10px;}
.week-hdr{background:var(--bg3);padding:5px 2px;text-align:center;font-size:.6rem;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);}
.week-hdr.today-col{color:var(--accent);}
.week-hdr.gym-col{color:var(--green);}
.week-time{background:var(--bg3);border-right:1px solid var(--border);padding:2px 4px;font-size:.55rem;color:var(--text3);font-family:var(--mono);text-align:right;border-bottom:1px solid var(--border);}
.week-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:28px;position:relative;cursor:pointer;transition:background .1s;}
.week-cell:active{background:var(--bg3);}
.week-cell.today-col{background:rgba(26,71,184,0.05);}
.week-ev{position:absolute;left:1px;right:1px;border-radius:3px;padding:1px 3px;font-size:.52rem;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;z-index:1;}
/* Gym popup */
.gym-popup{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.gym-box{background:var(--bg2);border:1px solid var(--borderBlue);border-radius:var(--r);padding:18px;width:100%;max-width:280px;text-align:center;}
.gym-box p{font-size:.9rem;font-weight:600;margin-bottom:14px;}
.gym-box .row{justify-content:center;gap:10px;}
.empty{text-align:center;padding:36px 20px;color:var(--text3);}
.eico{font-size:2.2rem;margin-bottom:8px;opacity:.45;}
.empty p{font-size:.8rem;}
.toast{position:fixed;top:calc(var(--hdrH) + var(--safet) + 8px);left:50%;transform:translateX(-50%);background:var(--bg4);border:1px solid var(--borderBlue);border-radius:var(--rs);padding:9px 15px;font-size:.78rem;font-weight:500;color:var(--text);z-index:999;white-space:nowrap;box-shadow:0 6px 20px rgba(0,0,0,.4);animation:fupa .2s ease;}
@keyframes fup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@keyframes fupa{from{opacity:0;transform:translateY(8px) translateX(-50%);}to{opacity:1;transform:translateY(0) translateX(-50%);}}
@keyframes sup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.fu{animation:fup .28s ease both;}
.fu1{animation:fup .28s .05s ease both;}
.fu2{animation:fup .28s .1s ease both;}
.fu3{animation:fup .28s .15s ease both;}
.fu4{animation:fup .28s .2s ease both;}
@media(min-width:600px){.content,.tabbar{max-width:580px;}.content{margin:0 auto;}.tabbar{left:50%;transform:translateX(-50%);}.fab{right:calc(50% - 290px + 14px);}}
</style>

<script type="text/babel">
const {useState,useEffect,useRef,useMemo,useCallback}=React;
const ME='JCM';
const LS={get:(k,d)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):d;}catch{return d;}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},};
const uid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=(d)=>{if(!d)return'';const[y,m,dy]=d.split('-');return`${dy}/${m}/${y}`;};
const fmtDS=(d)=>{if(!d)return'';const[,m,dy]=d.split('-');return`${dy}/${m}`;};
const fmtDL=(d)=>{if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});};
const mname=(y,m)=>new Date(y,m,1).toLocaleDateString('es-ES',{month:'long',year:'numeric'});
const getDIM=(y,m)=>new Date(y,m+1,0).getDate();
const getFirst=(y,m)=>{let d=new Date(y,m,1).getDay();return d===0?6:d-1;};
const dym=(d)=>d?d.slice(0,7):'';
const nowT=()=>new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
const nowD=()=>new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'});
const WCOLORS={JCM:'#60a5fa',Txema:'#34d399',Javi:'#a78bfa',Carlos:'#fbbf24',Jimmy:'#f87171',Manja:'#fb923c',Paco:'#22d3ee',Gustavo:'#e879f9',Alex:'#86efac'};
const wcolor=(w)=>WCOLORS[w]||'#8aabda';
const initials=(w)=>w?w.slice(0,2).toUpperCase():'??';

async function reqNotif(){if(!('Notification' in window))return false;if(Notification.permission==='granted')return true;return(await Notification.requestPermission())==='granted';}

function schedDailyReminder(){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const now=new Date();
  const target=new Date();
  target.setHours(18,0,0,0);
  if(target<=now)target.setDate(target.getDate()+1);
  const ms=target-now;
  setTimeout(()=>{
    new Notification('Memorias — Horas del día',{body:'¿Has registrado tus horas de hoy?',tag:'daily-reminder'});
    schedDailyReminder(); // reschedule for next day
  },ms);
}
function schedNotif(ev){if(!('Notification' in window)||Notification.permission!=='granted')return;const t=new Date(ev.fecha+'T'+(ev.hora||'09:00')).getTime()-Date.now()-((ev.aviso||15)*60000);if(t>0)setTimeout(()=>new Notification('DiarioPro',{body:ev.titulo,tag:ev.id}),t);}

function generarPDF(obraName,subobraName,worker,entradas,operariosExtra){
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const W=210,P=18;
  doc.setFillColor(26,71,184);doc.rect(0,0,W,26,'F');
  doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(18);doc.text('PARTE DE TRABAJO',P,16);
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.text('Fecha: '+fmtD(today()),W-P,11,{align:'right'});
  let y=34;
  doc.setFillColor(232,240,255);doc.roundedRect(P,y,W-P*2,20,2,2,'F');
  doc.setTextColor(26,71,184);doc.setFont('helvetica','bold');doc.setFontSize(8);doc.text('OBRA',P+4,y+6);
  doc.setTextColor(20,20,20);doc.setFont('helvetica','normal');doc.setFontSize(11);doc.text(obraName+(subobraName?' — '+subobraName:''),P+4,y+14);
  y+=26;
  const sorted=[...entradas].sort((a,b)=>a.fecha>b.fecha?1:-1);
  const fi=sorted[0]?.fecha||today(),ff=sorted[sorted.length-1]?.fecha||today();
  const tH=entradas.reduce((s,e)=>s+(parseFloat(e.horas)||0),0);
  const dias=[...new Set(entradas.map(e=>e.fecha))].length;
  [[fmtD(fi)+' a '+fmtD(ff),'PERIODO'],[String(dias),'DÍAS'],[tH+'h','TOTAL HORAS']].forEach(([v,l],i)=>{
    const x=P+i*((W-P*2)/3),cw=(W-P*2)/3;
    doc.setFillColor(245,248,255);doc.rect(x,y,cw,14,'F');doc.setDrawColor(200,215,245);doc.rect(x,y,cw,14,'S');
    doc.setFont('helvetica','bold');doc.setFontSize(6.5);doc.setTextColor(26,71,184);doc.text(l,x+3,y+5);
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(20,20,20);doc.text(v,x+3,y+12);
  });
  y+=20;doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,71,184);doc.text('JORNADAS',P,y);y+=4;
  doc.autoTable({startY:y,head:[['Fecha','Horas','Notas']],body:sorted.map(e=>[fmtD(e.fecha),e.horas+'h',e.notas||'']),margin:{left:P,right:P},styles:{fontSize:9,cellPadding:3.5,textColor:[20,20,20]},headStyles:{fillColor:[26,71,184],textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},alternateRowStyles:{fillColor:[248,251,255]},columnStyles:{0:{cellWidth:30},1:{cellWidth:20,halign:'center'},2:{cellWidth:'auto'}},});
  y=doc.lastAutoTable.finalY+8;
  const opRows=[[worker||ME,tH+'h','Encargado'],...(operariosExtra||[]).map(o=>[o.nombre,o.horas+'h','Operario'])];
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,71,184);doc.text('OPERARIOS',P,y);y+=4;
  doc.autoTable({startY:y,head:[['Nombre','Horas','Rol']],body:opRows,margin:{left:P,right:P},styles:{fontSize:9,cellPadding:3.5,textColor:[20,20,20]},headStyles:{fillColor:[26,71,184],textColor:[255,255,255],fontStyle:'bold',fontSize:7.5},alternateRowStyles:{fillColor:[248,251,255]},columnStyles:{0:{cellWidth:'auto'},1:{cellWidth:20,halign:'center'},2:{cellWidth:28}},});
  y=doc.lastAutoTable.finalY+8;
  const trabajos=entradas.map(e=>e.trabajos).filter(Boolean).join('\n');
  const mats=entradas.map(e=>e.materiales).filter(Boolean).join('\n');
  if(trabajos){doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,71,184);doc.text('TRABAJOS REALIZADOS',P,y);y+=4;const ls=doc.splitTextToSize(trabajos,W-P*2-6);const h2=Math.max(14,ls.length*5+8);doc.setFillColor(248,251,255);doc.setDrawColor(200,215,245);doc.roundedRect(P,y,W-P*2,h2,2,2,'FD');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(20,20,20);doc.text(ls,P+3,y+6);y+=h2+6;}
  if(mats){doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(26,71,184);doc.text('MATERIALES',P,y);y+=4;const ls=doc.splitTextToSize(mats,W-P*2-6);const h2=Math.max(14,ls.length*5+8);doc.setFillColor(248,251,255);doc.setDrawColor(200,215,245);doc.roundedRect(P,y,W-P*2,h2,2,2,'FD');doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(20,20,20);doc.text(ls,P+3,y+6);}
  doc.setFillColor(26,71,184);doc.rect(0,283,W,10,'F');doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(180,200,255);doc.text('DiarioPro — Juan (JCM)',W/2,289,{align:'center'});
  doc.save('Parte_'+obraName.replace(/\s+/g,'_')+(subobraName?'_'+subobraName.replace(/\s+/g,'_'):'')+'.pdf');
}

function Toast({msg,onDone}){useEffect(()=>{const t=setTimeout(onDone,2200);return()=>clearTimeout(t);},[]);return <div className="toast">{msg}</div>;}
function Confirm({msg,onOk,onCancel}){return(<div className="overlay ctr" onClick={onCancel}><div className="modal ctr" style={{padding:18}} onClick={e=>e.stopPropagation()}><p style={{fontSize:'.86rem',lineHeight:1.5,marginBottom:14}}>{msg}</p><div className="row"><button className="btn btng" style={{flex:1}} onClick={onCancel}>Cancelar</button><button className="btn btnd" style={{flex:1}} onClick={onOk}>Eliminar</button></div></div></div>);}

function AcInput({value,onChange,suggestions=[],placeholder}){
  const [open,setOpen]=useState(false);
  const filtered=(suggestions||[]).filter(s=>s&&s.toLowerCase().includes((value||'').toLowerCase())&&s!==value).slice(0,7);
  return(<div style={{position:'relative'}}>
    <input className="fi" value={value||''} placeholder={placeholder} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),160)}/>
    {open&&filtered.length>0&&(<div className="ac">{filtered.map(s=>(<div key={s} className="aci" onMouseDown={()=>{onChange(s);setOpen(false);}}>{s}</div>))}</div>)}
  </div>);
}

function wcIcon(wc){return wc===0?'☀️':wc<=2?'🌤️':wc<=3?'⛅':wc<=48?'🌫️':wc<=67?'🌧️':wc<=77?'🌨️':wc<=82?'🌦️':'⛈️';}
function wcDesc(wc){return wc===0?'Despejado':wc<=2?'Mayormente soleado':wc<=3?'Nublado':wc<=48?'Niebla':wc<=67?'Lluvia':wc<=77?'Nieve':wc<=82?'Chubascos':'Tormenta';}

function Clima(){
  const [data,setData]=useState(null);
  useEffect(()=>{
    fetch('https://api.open-meteo.com/v1/forecast?latitude=41.4469&longitude=2.2450&current=temperature_2m,weathercode,windspeed_10m,precipitation&hourly=temperature_2m,weathercode&timezone=Europe/Madrid&forecast_days=1')
      .then(r=>r.json()).then(d=>{
        const c=d.current;
        const nowH=new Date().getHours();
        // Get next 4 slots (3h intervals)
        const slots=[];
        const times=d.hourly.time;
        const temps=d.hourly.temperature_2m;
        const codes=d.hourly.weathercode;
        for(let i=0;i<times.length;i++){
          const h=parseInt(times[i].slice(11,13));
          if(h>nowH&&slots.length<4){slots.push({h,temp:Math.round(temps[i]),wc:codes[i]});}
        }
        setData({
          temp:Math.round(c.temperature_2m),
          icon:wcIcon(c.weathercode),
          desc:wcDesc(c.weathercode),
          wind:Math.round(c.windspeed_10m),
          rain:c.precipitation>0||c.weathercode>=51,
          slots
        });
      }).catch(()=>{});
  },[]);
  if(!data)return null;
  return(<div className="clima-card fu" style={{flexDirection:'column',gap:8}}>
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <div style={{fontSize:'2rem',lineHeight:1}}>{data.icon}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:'.82rem',fontWeight:600}}>{data.desc}</div>
        <div style={{fontSize:'.68rem',color:'var(--text3)',marginTop:2}}>Viento {data.wind} km/h{data.rain?' · 🌂 Lleva paraguas':''}</div>
      </div>
      <div style={{fontFamily:'var(--mono)',fontSize:'1.6rem',fontWeight:700,color:'var(--accent)'}}>{data.temp}°</div>
    </div>
    {data.slots?.length>0&&<div style={{display:'flex',gap:0,borderTop:'1px solid var(--border)',paddingTop:8}}>
      {data.slots.map(s=><div key={s.h} style={{flex:1,textAlign:'center'}}>
        <div style={{fontSize:'.55rem',color:'var(--text3)',fontFamily:'var(--mono)'}}>{String(s.h).padStart(2,'0')}h</div>
        <div style={{fontSize:'.85rem',margin:'2px 0'}}>{wcIcon(s.wc)}</div>
        <div style={{fontSize:'.62rem',fontFamily:'var(--mono)',fontWeight:600,color:'var(--text2)'}}>{s.temp}°</div>
      </div>)}
    </div>}
  </div>);
}

function ChartHorasMes({horas}){
  const misH=horas.filter(h=>h.trabajador===ME);
  const hoy=today();const [y,m]=hoy.split('-').map(Number);
  // Agrupar por semana del mes
  const semanas=[0,0,0,0,0];
  misH.filter(h=>h.fecha&&h.fecha.startsWith(`${y}-${String(m).padStart(2,'0')}`)).forEach(h=>{
    const d=parseInt(h.fecha.split('-')[2]);
    const s=Math.min(Math.floor((d-1)/7),4);
    semanas[s]+=parseFloat(h.horas)||0;
  });
  const max=Math.max(...semanas,1);
  const lbls=['S1','S2','S3','S4','S5'];

function ResumenMes({horas,onShare}){
  const hoy=today();const m=hoy.slice(0,7);
  const misH=horas.filter(h=>h.trabajador===ME&&h.fecha&&h.fecha.startsWith(m));
  if(misH.length===0)return null;
  let norm=0,extra=0,finde=0;
  misH.forEach(h=>{
    const t=getDayType(h.fecha);const hrs=parseFloat(h.horas)||0;
    if(t==='finde')finde+=hrs;
    else if(t==='viernes'){
      // approx: 6h norm, rest extra
      const n=Math.min(hrs,6);norm+=n;extra+=Math.max(0,hrs-n);
    } else {
      // approx: 7h norm (8-14, 15-18), rest extra
      const n=Math.min(hrs,7);norm+=n;extra+=Math.max(0,hrs-n);
    }
  });
  const total=norm+extra+finde;

  function shareWA(){
    const now=new Date();const mes=now.toLocaleDateString('es-ES',{month:'long',year:'numeric'});
    const txt='Resumen '+mes+':\n- Normal: '+norm.toFixed(0)+'h\n- Extra: '+extra.toFixed(0)+'h\n- Finde/festivo: '+finde.toFixed(0)+'h\n- TOTAL: '+total.toFixed(0)+'h';
    onShare(txt);
  }

  return(<div className="card cp" style={{marginBottom:10}}>
    <div className="row" style={{marginBottom:8,justifyContent:'space-between'}}>
      <span className="slabel">Resumen del mes</span>
      <button className="btn btng bxs" onClick={shareWA}>WA</button>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6}}>
      {[['Normal',norm,'var(--green)'],['Extra',extra,'var(--orange,#fb923c)'],['Finde',finde,'var(--red)']].map(([l,v,c])=>(
        <div key={l} style={{textAlign:'center',background:'var(--bg3)',borderRadius:'var(--rs)',padding:'8px 4px'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:'.95rem',fontWeight:700,color:c}}>{v.toFixed(0)}h</div>

        </div>
      ))}
    </div>
  </div>);
}

// Hour coloring helpers
function getDayType(dateStr){
  const d=new Date(dateStr+'T12:00:00');const dow=d.getDay(); // 0=Sun,1=Mon...6=Sat
  if(dow===0||dow===6)return'finde';
  if(dow===5)return'viernes';
  return'semana';
}
function getHourColor(h,dateStr){
  const hour=parseInt(h);const type=getDayType(dateStr);
  if(type==='finde')return'rgba(248,113,113,0.18)'; // rojo
  if(type==='viernes'){
    if(hour>=8&&hour<14)return'rgba(52,211,153,0.15)'; // verde
    if(hour>=15)return'rgba(251,146,60,0.18)'; // naranja
    return'transparent'; // 14h comida no aplica en viernes
  }
  // Lu-Ju
  if(hour>=8&&hour<14)return'rgba(52,211,153,0.15)'; // verde
  if(hour===14)return'transparent'; // comida
  if(hour>=15&&hour<18)return'rgba(52,211,153,0.15)'; // verde
  if(hour>=18)return'rgba(251,146,60,0.18)'; // naranja
  return'transparent';
}
function getHourBorder(h,dateStr){
  const hour=parseInt(h);const type=getDayType(dateStr);
  if(type==='finde')return'rgba(248,113,113,0.35)';
  if(type==='viernes'){
    if(hour>=8&&hour<14)return'rgba(52,211,153,0.3)';
    if(hour>=15)return'rgba(251,146,60,0.3)';
    return'var(--border)';
  }
  if(hour>=8&&hour<14)return'rgba(52,211,153,0.3)';
  if(hour===14)return'var(--border)';
  if(hour>=15&&hour<18)return'rgba(52,211,153,0.3)';
  if(hour>=18)return'rgba(251,146,60,0.3)';
  return'var(--border)';
}

// Catalunya festivos (fixed + calculados)
function getFestivos(year){
  // Calcula Pascua (algoritmo de Butcher)
  function pascua(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),month=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;return new Date(y,month-1,day);}
  const p=pascua(year);
  const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r.toISOString().slice(0,10);};
  const fmt=(d)=>d.toISOString().slice(0,10);
  return new Set([
    `${year}-01-01`, // Any nou
    `${year}-01-06`, // Reis
    addD(p,-2),      // Divendres Sant
    addD(p,1),       // Dilluns de Pasqua
    `${year}-05-01`, // Dia del Treball
    addD(p,50),      // Dilluns de Pasqua Granada
    `${year}-06-24`, // Sant Joan
    `${year}-08-15`, // Assumpció
    `${year}-09-11`, // Diada Nacional
    `${year}-09-24`, // La Mercè (BCN)
    `${year}-10-12`, // Festa Nacional Espanyola
    `${year}-11-01`, // Tots Sants
    `${year}-12-06`, // Constitució
    `${year}-12-08`, // Immaculada
    `${year}-12-25`, // Nadal
    `${year}-12-26`, // Sant Esteve
  ]);
}

function getWeekDates(ref){const d=new Date(ref+'T12:00:00');const day=d.getDay();const diff=day===0?-6:1-day;const mon=new Date(d);mon.setDate(d.getDate()+diff);return Array.from({length:7},(_,i)=>{const dt=new Date(mon);dt.setDate(mon.getDate()+i);return dt.toISOString().slice(0,10);});}
function expandRecurring(evs,rs,re){const exp=[];evs.forEach(ev=>{exp.push(ev);if(!ev.recurrence||ev.recurrence==='none')return;const base=new Date(ev.fecha+'T12:00:00');const end=new Date(re+'T12:00:00');let cur=new Date(base);for(let i=0;i<120;i++){if(ev.recurrence==='weekly')cur.setDate(cur.getDate()+7);else if(ev.recurrence==='monthly')cur.setMonth(cur.getMonth()+1);else if(ev.recurrence==='daily')cur.setDate(cur.getDate()+1);if(cur>end)break;const d=cur.toISOString().slice(0,10);if(d>=rs)exp.push({...ev,id:ev.id+'_r'+i,fecha:d,_recurring:true});}});return exp;}

      const nO=[...obras,{id:uid(),nombre:oN,estado:'Activa',fotos:[],createdAt:today()}];
      setObras(nO);LS.set('dp_obs',nO);
    }
    const upd=[{...formH,id:uid(),trabajador:ME},...horas];
    setHoras(upd);LS.set('dp_hor',upd);
    setFormH(null);showToast('Horas guardadas ✓');
  }
  function save(){if(!form?.titulo?.trim())return;let upd;if(form.id&&!form._recurring){upd=eventos.map(e=>e.id===form.id?{...form,recurrence:form.recurrence||'none'}:e);}else if(!form.id){const ne={...form,id:uid(),recurrence:form.recurrence||'none'};upd=[...eventos,ne];schedNotif(ne);}else{upd=eventos;}setEventos(upd);LS.set('dp_ev',upd);setForm(null);showToast('Evento guardado');}
  function del2(){const base=del.replace(/_r\d+$/,'');const upd=eventos.filter(e=>e.id!==base);setEventos(upd);LS.set('dp_ev',upd);setDel(null);showToast('Eliminado');}
  function startLong(date){longPressTimer.current=setTimeout(()=>setGymPopup(date),500);}
  function cancelLong(){clearTimeout(longPressTimer.current);}
  function toggleGym(date,yes){const upd=yes?[...new Set([...gymDays,date])]:gymDays.filter(d=>d!==date);setGymDays(upd);LS.set('dp_gym',upd);setGymPopup(null);if(yes)showToast('Gym marcado ✓');}

  return(<div>
    <div className="row fu" style={{marginBottom:10,justifyContent:'space-between'}}>
      <button className="btn btng bsm bico" onClick={vista==='mes'?pm:pw}>‹</button>
      <div className="col" style={{alignItems:'center',gap:4}}>
        <span style={{fontSize:'.86rem',fontWeight:600,textTransform:'capitalize'}}>{vista==='mes'?mname(vy,vm):`${fmtDS(weekDates[0])} – ${fmtDS(weekDates[6])}`}</span>
        <div className="row" style={{gap:4}}>
          {['mes','semana'].map(v=>(<button key={v} onClick={()=>setVista(v)} style={{padding:'2px 9px',borderRadius:20,fontSize:'.6rem',fontWeight:600,background:vista===v?'var(--blue)':'var(--bg3)',color:vista===v?'#fff':'var(--text2)',border:`1px solid ${vista===v?'var(--blue)':'var(--border)'}`}}>{v==='mes'?'Mes':'Semana'}</button>))}
        </div>
      </div>
      <button className="btn btng bsm bico" onClick={vista==='mes'?nm:nw}>›</button>
    </div>

    {vista==='mes'&&(<div className="card cp fu1">
      <div className="cgrid" style={{marginBottom:6}}>
        {['Lu','Ma','Mi','Ju','Vi','Sá','Do'].map(d=><div key={d} className="cname">{d}</div>)}
        {cells.map((c,i)=>{const isGym=gymDays.includes(c.date)&&c.date!==sel;return(<div key={i}
          className={`cday${!c.cur?' dim':''}${c.date===hoy?' tod':''}${c.date===sel?' sel':''}${evD.has(c.date)?' dot':''}${isGym?' gym':''}`}
          onClick={()=>c.cur&&c.date&&setSel(c.date)}
          onMouseDown={()=>c.cur&&startLong(c.date)} onMouseUp={cancelLong} onMouseLeave={cancelLong}
          onTouchStart={()=>c.cur&&startLong(c.date)} onTouchEnd={cancelLong} onTouchMove={cancelLong}>
          {c.day||''}
        </div>);})}
      </div>
      
      {(()=>{const gm=gymDays.filter(d=>d.startsWith(`${vy}-${String(vm+1).padStart(2,'0')}`));return gm.length>0?(<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:6,paddingTop:8,fontSize:'.72rem',color:'var(--green)',fontWeight:600}}>{gm.length} {gm.length===1?'día':'días'} de gym este mes</div>):null;})()}
    </div>)}

    {vista==='semana'&&(<div className="fu1" style={{overflowX:'auto',marginBottom:10}}>
      <div style={{display:'grid',gridTemplateColumns:'38px repeat(7,1fr)',border:'1px solid var(--border)',borderRadius:'var(--rs)',overflow:'hidden',minWidth:320}}>
        <div style={{background:'var(--bg3)',borderBottom:'1px solid var(--border)'}}/>
        {weekDates.map(d=>{
          const isT=d===hoy;const isG=gymDays.includes(d);
          const dn=new Date(d+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short'});
          const dd=parseInt(d.slice(8));
          const dayObras=[...new Set(horas.filter(h=>h.fecha===d&&h.trabajador===ME).map(h=>h.obra))];
          const dayH=horas.filter(h=>h.fecha===d&&h.trabajador===ME).reduce((s,h)=>s+(parseFloat(h.horas)||0),0);
          return(<div key={d}
            style={{background:'var(--bg3)',borderBottom:'1px solid var(--border)',borderLeft:'1px solid var(--border)',padding:'4px 2px',textAlign:'center',cursor:'pointer',minHeight:52}}
            onClick={()=>{setSel(d);setFormH({obra:'',subobra:'',fecha:d,horas:8,notas:'',trabajos:'',materiales:'',_quick:true});}}
            onMouseDown={()=>startLong(d)} onMouseUp={cancelLong} onTouchStart={()=>startLong(d)} onTouchEnd={cancelLong} onTouchMove={cancelLong}>
            <div style={{fontSize:'.55rem',color:isG?'var(--green)':isT?'var(--accent)':'var(--text3)',fontWeight:600,textTransform:'capitalize'}}>{dn}</div>
            <div style={{fontSize:'.72rem',fontWeight:700,color:isG?'var(--green)':isT?'var(--accent)':'var(--text)'}}>{dd}</div>
            {dayObras.length>0
              ?<div style={{marginTop:2}}>{dayObras.slice(0,2).map(o=><div key={o} style={{fontSize:'.42rem',color:'var(--accent)',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',padding:'0 2px',lineHeight:1.4}}>{o.length>9?o.slice(0,8)+'…':o}</div>)}<div style={{fontSize:'.48rem',fontFamily:'var(--mono)',color:'var(--green)',fontWeight:700,marginTop:1}}>{dayH}h</div></div>
              :<div style={{fontSize:'.6rem',color:'var(--text3)',marginTop:4,opacity:.5}}>+</div>
            }
          </div>);
        })}
        {HOURS.map(h=>[
          <div key={h} style={{background:'var(--bg3)',borderTop:'1px solid var(--border)',borderRight:'1px solid var(--border)',padding:'3px 3px',fontSize:'.52rem',color:'var(--text3)',fontFamily:'var(--mono)',textAlign:'right',lineHeight:1}}>{h}</div>,
          ...weekDates.map(d=>{
            const hEvs=exWeek.filter(e=>e.fecha===d&&e.hora&&e.hora.startsWith(h));
            const isT=d===hoy;
            return(<div key={d+h} style={{borderTop:`1px solid ${getHourBorder(h,d)}`,borderLeft:'1px solid var(--border)',minHeight:26,position:'relative',background:isT?`linear-gradient(${getHourColor(h,d)},${getHourColor(h,d)}), rgba(26,71,184,0.05)`:getHourColor(h,d),cursor:'pointer'}}
              onClick={()=>{setSel(d);setForm({titulo:'',fecha:d,hora:h+':00',lugar:'',cat:'Trabajo',aviso:15,notas:'',recurrence:'none'});}}>
              {hEvs.map(ev=>(<div key={ev.id} style={{position:'absolute',left:1,right:1,top:1,borderRadius:2,padding:'0 2px',fontSize:'.48rem',fontWeight:600,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis',background:CCAT[ev.cat]||'var(--blue3)',color:'#fff'}}>{ev.titulo}</div>))}
            </div>);
          })
        ])}
      </div>
    </div>)}

    {vista==='semana'&&(()=>{
      const hNorm=[];const hExtra=[];const hFinde=[];
      HOURS.forEach(h=>{weekDates.forEach(d=>{
        const evs=exWeek.filter(e=>e.fecha===d&&e.hora&&e.hora.startsWith(h));
        if(evs.length===0)return;
        const type=getDayType(d);const hour=parseInt(h);
        if(type==='finde')hFinde.push(...evs);
        else if(type==='viernes'&&hour>=15)hExtra.push(...evs);
        else if(type==='semana'&&hour>=18)hExtra.push(...evs);
        else if(hour!==14)hNorm.push(...evs);
      });});
      // simpler: count by registered horas entries
      const wH={norm:0,extra:0,finde:0};
      exWeek.filter(e=>e.trabajador===ME).forEach(e=>{
        const t=getDayType(e.fecha);
        if(t==='finde')wH.finde+=parseFloat(e.horas)||0;
        else wH.norm+=parseFloat(e.horas)||0;
      });
      const tot=wH.norm+wH.extra+wH.finde;
      if(tot===0)return null;
      return(<div className="card cp" style={{marginBottom:10,display:'flex',gap:0}}>
        {[['Normal',wH.norm.toFixed(0)+'h','var(--green)'],['Extra',wH.extra.toFixed(0)+'h','var(--orange,#fb923c)'],['Finde',wH.finde.toFixed(0)+'h','var(--red)']].map(([l,v,c])=>(<div key={l} style={{flex:1,textAlign:'center',borderRight:'1px solid var(--border)',padding:'4px 0'}}>
          <div style={{fontFamily:'var(--mono)',fontSize:'.95rem',fontWeight:700,color:c}}>{v}</div>
          <div style={{fontSize:'.58rem',color:'var(--text3)',marginTop:2,textTransform:'uppercase',letterSpacing:'.06em'}}>{l}</div>
        </div>))}
      </div>);
    })()}

    <div className="fu2">
      <div className="row" style={{margin:'10px 0 7px'}}>
        <span className="slabel" style={{flex:1,textTransform:'capitalize'}}>{fmtDL(sel)}</span>
        <button className="btn btnp bsm" onClick={()=>setForm({titulo:'',fecha:sel,hora:'09:00',lugar:'',cat:'Trabajo',aviso:15,notas:'',recurrence:'none'})}>+ Evento</button>
      </div>
      {dayEvs.length===0?<div className="empty"><div className="eico">📅</div><p>Sin eventos</p></div>
        :<div className="card" style={{padding:0}}>{dayEvs.map(e=>(<div key={e.id} className="li" onClick={()=>!e._recurring&&setForm({...e})}>
          <div style={{width:3,height:32,borderRadius:2,background:CCAT[e.cat]||'var(--blue3)',flexShrink:0}}/>
          <span style={{fontFamily:'var(--mono)',fontSize:'.68rem',color:'var(--accent)',minWidth:36}}>{e.hora}</span>
          <div className="li-m"><div className="li-t">{e.titulo}{e._recurring&&<span style={{fontSize:'.55rem',color:'var(--text3)',marginLeft:4}}>↻</span>}</div>{e.lugar&&<div className="li-s">📍 {e.lugar}</div>}</div>
          <span className={`badge ${e.cat==='Personal'?'bg2c':e.cat==='Médico'?'br':e.cat==='Gestión'?'by':'bb'}`}>{e.cat}</span>
          {!e._recurring&&<button className="btn btng bxs bico" onClick={ev=>{ev.stopPropagation();setDel(e.id);}}>🗑</button>}
        </div>))}</div>
      }
    </div>
    <div className="fab" onClick={()=>setForm({titulo:'',fecha:sel,hora:'09:00',lugar:'',cat:'Trabajo',aviso:15,notas:'',recurrence:'none'})}>+</div>

    {gymPopup&&(<div className="gym-popup" onClick={()=>setGymPopup(null)}><div className="gym-box" onClick={e=>e.stopPropagation()}>
      <p>{gymDays.includes(gymPopup)?'Quitar gym de':'Marcar gym en'} el {fmtDS(gymPopup)}?</p>
      <div className="row"><button className="btn btng" style={{flex:1}} onClick={()=>setGymPopup(null)}>No</button><button className="btn btnp" style={{flex:1}} onClick={()=>toggleGym(gymPopup,!gymDays.includes(gymPopup))}>Sí</button></div>
    </div></div>)}

    {form&&(<div className="overlay" onClick={()=>setForm(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="mhdr"><span className="mtit">{form.id&&!form._recurring?'Editar':'Nuevo evento'}</span><span className="mcls" onClick={()=>setForm(null)}>✕</span></div>
      <div className="mbody">
        <div className="field"><label>Título *</label><input className="fi" value={form.titulo} onChange={e=>setForm(v=>({...v,titulo:e.target.value}))} placeholder="Ej. Revisión ISDIN"/></div>
        <div className="fr2"><div className="field"><label>Fecha</label><input type="date" className="fi" value={form.fecha} onChange={e=>setForm(v=>({...v,fecha:e.target.value}))}/></div><div className="field"><label>Hora</label><input type="time" className="fi" value={form.hora} onChange={e=>setForm(v=>({...v,hora:e.target.value}))}/></div></div>
        <div className="fr2"><div className="field"><label>Categoría</label><select className="fi" value={form.cat} onChange={e=>setForm(v=>({...v,cat:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div><div className="field"><label>Aviso</label><select className="fi" value={form.aviso} onChange={e=>setForm(v=>({...v,aviso:+e.target.value}))}>{AVISS.map(a=><option key={a.v} value={a.v}>{a.l}</option>)}</select></div></div>
        <div className="field"><label>Repetición</label><select className="fi" value={form.recurrence||'none'} onChange={e=>setForm(v=>({...v,recurrence:e.target.value}))}>{REC.map(r=><option key={r.v} value={r.v}>{r.l}</option>)}</select></div>
        <div className="field"><label>Lugar</label><input className="fi" value={form.lugar||''} onChange={e=>setForm(v=>({...v,lugar:e.target.value}))} placeholder="Dirección o lugar"/></div>
        <div className="field"><label>Notas</label><textarea className="fi" value={form.notas||''} onChange={e=>setForm(v=>({...v,notas:e.target.value}))} placeholder="Notas..."/></div>
      </div>
      <div className="mfoot"><button className="btn btng" onClick={()=>setForm(null)}>Cancelar</button><button className="btn btnp" onClick={save}>Guardar</button></div>
    </div></div>)}
    {del&&<Confirm msg="¿Eliminar este evento y todas sus repeticiones?" onOk={del2} onCancel={()=>setDel(null)}/>}
    {formH&&(<div className="overlay" onClick={()=>setFormH(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="mhdr"><span className="mtit">Registrar horas — {fmtDS(formH.fecha)}</span><span className="mcls" onClick={()=>setFormH(null)}>✕</span></div>
      <div className="mbody">
        <div className="fr2"><div className="field" style={{marginBottom:0}}><label>Fecha</label><input type="date" className="fi" value={formH.fecha} onChange={e=>setFormH(v=>({...v,fecha:e.target.value}))}/></div><div className="field" style={{marginBottom:0}}><label>Horas</label><input type="number" className="fi" min="0" max="24" step="0.5" value={formH.horas} onChange={e=>setFormH(v=>({...v,horas:e.target.value}))}/></div></div>
        <div style={{height:11}}/>
        <div className="field"><label>Obra *</label><AcInput value={formH.obra} onChange={v=>setFormH(f=>({...f,obra:v}))} suggestions={[...new Set([...horas.map(h=>h.obra),...obras.map(o=>o.nombre)].filter(Boolean))].sort()} placeholder="Torre Puig, ISDIN, Exea..."/></div>
        <div className="field"><label>Subobra</label><AcInput value={formH.subobra||''} onChange={v=>setFormH(f=>({...f,subobra:v}))} suggestions={[...new Set(horas.filter(h=>h.obra===formH.obra).map(h=>h.subobra).filter(Boolean))].sort()} placeholder="Planta 3, HDMI, Leds..."/></div>
        <div className="field"><label>Notas</label><input className="fi" value={formH.notas||''} onChange={e=>setFormH(v=>({...v,notas:e.target.value}))} placeholder="Descripción rápida..."/></div>
      </div>
      <div className="mfoot"><button className="btn btng" onClick={()=>setFormH(null)}>Cancelar</button><button className="btn btnp" onClick={saveH}>Guardar</button></div>
    </div></div>)}
  </div>);
}

// ── TAREAS ────────────────────────────────────────────────────────────────────
function Tareas({tareas,setTareas,showToast}){
  const [filtro,setFiltro]=useState('Todas');
  const [form,setForm]=useState(null);
  const [del,setDel]=useState(null);
  const [showD,setShowD]=useState(false);
  const TIPOS=['Ir a','Pedir material','Hacer'];
  const PRIOS=['Alta','Media','Baja'];
  const FLTRS=['Todas','Ir a','Pedir material','Hacer'];
  const pC={Alta:'var(--red)',Media:'var(--yellow)',Baja:'var(--text3)'};
  const tC={'Ir a':'var(--green)','Pedir material':'var(--yellow)','Hacer':'var(--accent)'};
  const activas=tareas.filter(t=>!t.done);
  const hechas=tareas.filter(t=>t.done);
  const filtered=activas.filter(t=>filtro==='Todas'||t.tipo===filtro).sort((a,b)=>({Alta:0,Media:1,Baja:2}[a.prio]-{Alta:0,Media:1,Baja:2}[b.prio]));
  function saveH(){
    if(!formH?.obra?.trim()||!formH?.horas)return;
    const oN=formH.obra.trim();
    const existing=obras.find(o=>o.nombre===oN);
    if(!existing){
      const nO=[...obras,{id:uid(),nombre:oN,estado:'Activa',fotos:[],createdAt:today()}];
      setObras(nO);LS.set('dp_obs',nO);
    }
    const upd=[{...formH,id:uid(),trabajador:ME},...horas];
    setHoras(upd);LS.set('dp_hor',upd);
    setFormH(null);showToast('Horas guardadas ✓');
  }
  function save(){if(!form?.titulo?.trim())return;let upd;if(form.id){upd=tareas.map(t=>t.id===form.id?form:t);}else{upd=[{...form,id:uid(),done:false},...tareas];}setTareas(upd);LS.set('dp_tar',upd);setForm(null);showToast('Guardada');}
  function toggle(id){const upd=tareas.map(t=>t.id===id?{...t,done:!t.done}:t);setTareas(upd);LS.set('dp_tar',upd);}
  function del2(){const upd=tareas.filter(t=>t.id!==del);setTareas(upd);LS.set('dp_tar',upd);setDel(null);showToast('Eliminada');}
  return(<div>
    <div className="row fu" style={{gap:5,overflowX:'auto',paddingBottom:4,marginBottom:11}}>
      {FLTRS.map(f=>(<button key={f} onClick={()=>setFiltro(f)} style={{whiteSpace:'nowrap',padding:'5px 11px',borderRadius:20,fontSize:'.7rem',fontWeight:600,flexShrink:0,background:filtro===f?'var(--blue)':'var(--bg3)',color:filtro===f?'#fff':'var(--text2)',border:`1px solid ${filtro===f?'var(--blue)':'var(--border)'}`}}>{f}</button>))}
    </div>
    {filtered.length===0?<div className="empty fu1"><div className="eico">✅</div><p>Sin tareas aquí</p></div>
      :<div className="card fu1" style={{padding:0}}>{filtered.map(t=>(<div key={t.id} className="li" onClick={()=>setForm({...t})}>
        <div className="chk" onClick={e=>{e.stopPropagation();toggle(t.id);}}><span style={{fontSize:'.7rem'}}>{t.tipo==='Ir a'?'📍':t.tipo==='Pedir material'?'📦':'·'}</span></div>
        <div className="li-m">
          <div className="li-t">{t.titulo}</div>
          <div className="row" style={{gap:5,marginTop:2}}>
            <span style={{fontSize:'.62rem',color:tC[t.tipo]||'var(--text3)'}}>{t.tipo}</span>
            {t.notas&&<span style={{fontSize:'.6rem',color:'var(--text3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:120}}>· {t.notas}</span>}
          </div>
        </div>
        <div style={{width:7,height:7,borderRadius:'50%',background:pC[t.prio],flexShrink:0}}/>
        <button className="btn btng bxs bico" onClick={e=>{e.stopPropagation();setDel(t.id);}}>🗑</button>
      </div>))}</div>
    }
    {hechas.length>0&&(<div className="fu2" style={{marginTop:10}}>
      <button className="btn btng" style={{width:'100%',justifyContent:'space-between'}} onClick={()=>setShowD(v=>!v)}><span>Completadas ({hechas.length})</span><span>{showD?'▲':'▼'}</span></button>
      {showD&&<div className="card" style={{padding:0,marginTop:6,opacity:.6}}>{hechas.map(t=>(<div key={t.id} className="li"><div className="chk on" onClick={()=>toggle(t.id)}>✓</div><div className="li-m"><div className="li-t" style={{textDecoration:'line-through',color:'var(--text3)'}}>{t.titulo}</div></div><button className="btn btng bxs bico" onClick={()=>setDel(t.id)}>🗑</button></div>))}</div>}
    </div>)}
    <div className="fab" onClick={()=>setForm({titulo:'',tipo:'Hacer',prio:'Media',fecha:'',notas:''})}>+</div>
    {form&&(<div className="overlay" onClick={()=>setForm(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="mhdr"><span className="mtit">{form.id?'Editar':'Nueva tarea'}</span><span className="mcls" onClick={()=>setForm(null)}>✕</span></div>
      <div className="mbody">
        <div className="field"><label>Descripción *</label><input className="fi" value={form.titulo} onChange={e=>setForm(v=>({...v,titulo:e.target.value}))} placeholder="¿Qué hay que hacer?"/></div>
        <div className="fr2"><div className="field"><label>Tipo</label><select className="fi" value={form.tipo} onChange={e=>setForm(v=>({...v,tipo:e.target.value}))}>{TIPOS.map(t=><option key={t}>{t}</option>)}</select></div><div className="field"><label>Prioridad</label><select className="fi" value={form.prio} onChange={e=>setForm(v=>({...v,prio:e.target.value}))}>{PRIOS.map(p=><option key={p}>{p}</option>)}</select></div></div>
        <div className="field">
          <label>Fecha límite <span style={{fontWeight:400,color:'var(--text3)',textTransform:'none'}}>(opcional — sin fecha aparece siempre en Hoy)</span></label>
          <input type="date" className="fi" value={form.fecha||''} onChange={e=>setForm(v=>({...v,fecha:e.target.value}))}/>
        </div>
        <div className="field"><label>Notas</label><textarea className="fi" value={form.notas||''} onChange={e=>setForm(v=>({...v,notas:e.target.value}))} placeholder="Proveedor, cantidad, detalle..."/></div>
      </div>
      <div className="mfoot"><button className="btn btng" onClick={()=>setForm(null)}>Cancelar</button><button className="btn btnp" onClick={save}>Guardar</button></div>
    </div></div>)}
    {del&&<Confirm msg="¿Eliminar esta tarea?" onOk={del2} onCancel={()=>setDel(null)}/>}
  </div>);
}

// ── OBRAS ─────────────────────────────────────────────────────────────────────
function Obras({horas,setHoras,obras,setObras,showToast}){
  const [vista,setVista]=useState('list');
  const [obraAct,setObraAct]=useState(null);
  const [workerAct,setWorkerAct]=useState(null);
  const [subobraAct,setSubobraAct]=useState(null);
  const [filtroE,setFiltroE]=useState('');
  const [filtroMes,setFiltroMes]=useState('');
  const [formH,setFormH]=useState(null);
  const [formPDF,setFormPDF]=useState(null);
  const [fotoM,setFotoM]=useState(null);
  const [del,setDel]=useState(null);
  const [busq,setBusq]=useState('');

  const obraNames=useMemo(()=>[...new Set([...horas.map(h=>h.obra),...obras.map(o=>o.nombre)].filter(Boolean))].sort(),[horas,obras]);
  const subNames=useMemo(()=>{if(!obraAct)return[];return[...new Set(horas.filter(h=>h.obra===obraAct.nombre).map(h=>h.subobra).filter(Boolean))].sort();},[horas,obraAct]);

  const obraGrps=useMemo(()=>{
    const map={};
    horas.forEach(h=>{const k=h.obra||'Sin obra';if(!map[k])map[k]={nombre:k,totalH:0,entradas:[],ultima:'',workers:{}};map[k].totalH+=parseFloat(h.horas)||0;map[k].entradas.push(h);if(h.fecha>map[k].ultima)map[k].ultima=h.fecha;const w=h.trabajador||'?';if(!map[k].workers[w])map[k].workers[w]={h:0,count:0};map[k].workers[w].h+=parseFloat(h.horas)||0;map[k].workers[w].count++;});
    obras.forEach(o=>{if(!map[o.nombre])map[o.nombre]={nombre:o.nombre,totalH:0,entradas:[],ultima:'',workers:{},meta:o};else map[o.nombre].meta=o;});
    return Object.values(map).sort((a,b)=>b.ultima>a.ultima?1:-1);
  },[horas,obras]);

  const obraAcState=useMemo(()=>obraGrps.find(g=>g.nombre===obraAct?.nombre)||obraAct,[obraGrps,obraAct]);

  const subGrps=useMemo(()=>{
    if(!obraAct)return[];
    const ents=workerAct?horas.filter(h=>h.obra===obraAct.nombre&&h.trabajador===workerAct):horas.filter(h=>h.obra===obraAct.nombre);
    const map={};
    ents.forEach(h=>{const k=h.subobra||'';if(!map[k])map[k]={nombre:k,totalH:0,entradas:[],primera:'',ultima:''};map[k].totalH+=parseFloat(h.horas)||0;map[k].entradas.push(h);if(!map[k].primera||h.fecha<map[k].primera)map[k].primera=h.fecha;if(h.fecha>map[k].ultima)map[k].ultima=h.fecha;});
    return Object.values(map).sort((a,b)=>b.totalH-a.totalH);
  },[horas,obraAct,workerAct]);

  const subE=useMemo(()=>{
    if(!obraAct||subobraAct===null)return[];
    let e=horas.filter(h=>h.obra===obraAct.nombre&&(h.subobra||'')===(subobraAct||''));
    if(workerAct)e=e.filter(h=>h.trabajador===workerAct);
    if(filtroMes)e=e.filter(h=>dym(h.fecha)===filtroMes);
    return e.sort((a,b)=>b.fecha>a.fecha?1:-1);
  },[horas,obraAct,subobraAct,workerAct,filtroMes]);

  const mesesSub=useMemo(()=>{
    if(!obraAct||subobraAct===null)return[];
    let e=horas.filter(h=>h.obra===obraAct.nombre&&(h.subobra||'')===(subobraAct||''));
    if(workerAct)e=e.filter(h=>h.trabajador===workerAct);
    return[...new Set(e.map(h=>dym(h.fecha)).filter(Boolean))].sort((a,b)=>b>a?1:-1);
  },[horas,obraAct,subobraAct,workerAct]);

  const obraFotos=useMemo(()=>{if(!obraAct)return[];const ob=obras.find(o=>o.nombre===obraAct.nombre);return ob?.fotos||[];},[obras,obraAct]);

  function saveH(){
    if(!formH?.obra?.trim()||!formH?.horas)return;
    const oN=formH.obra.trim();
    if(!obras.find(o=>o.nombre===oN)){const nO=[...obras,{id:uid(),nombre:oN,estado:'Activa',fotos:[],createdAt:today()}];setObras(nO);LS.set('dp_obs',nO);}
    let upd;if(formH.id){upd=horas.map(h=>h.id===formH.id?{...formH,trabajador:ME}:h);}else{upd=[{...formH,id:uid(),trabajador:ME},...horas];}
    setHoras(upd);LS.set('dp_hor',upd);setFormH(null);showToast('Horas guardadas ✓');
  }
  function delH(){const upd=horas.filter(h=>h.id!==del);setHoras(upd);LS.set('dp_hor',upd);setDel(null);showToast('Eliminado');}
  function addFoto(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{const foto={id:uid(),data:ev.target.result,nombre:file.name,fecha:today(),tipo:'foto'};const upd=obras.map(o=>o.nombre===obraAct.nombre?{...o,fotos:[...(o.fotos||[]),foto]}:o);setObras(upd);LS.set('dp_obs',upd);showToast('Foto añadida ✓');};r.readAsDataURL(file);}
  function addArchivo(e){
    const file=e.target.files[0];if(!file)return;
    if(file.size>10*1024*1024){showToast('Archivo demasiado grande (máx 10MB)');return;}
    const r=new FileReader();
    r.onload=ev=>{
      const size=file.size>1024*1024?(file.size/(1024*1024)).toFixed(1)+'MB':(file.size/1024).toFixed(0)+'KB';
      const arch={id:uid(),data:ev.target.result,nombre:file.name,fecha:today(),tipo:'archivo',size,mimeType:file.type};
      const upd=obras.map(o=>o.nombre===obraAct.nombre?{...o,fotos:[...(o.fotos||[]),arch]}:o);
      setObras(upd);LS.set('dp_obs',upd);showToast('Archivo subido ✓');
    };
    r.readAsDataURL(file);
  }
  function delFoto(fid){const upd=obras.map(o=>o.nombre===obraAct.nombre?{...o,fotos:(o.fotos||[]).filter(f=>f.id!==fid)}:o);setObras(upd);LS.set('dp_obs',upd);setFotoM(null);showToast('Foto eliminada');}
  function abrirPDF(sub){const w=workerAct||ME;const ents=horas.filter(h=>h.obra===obraAct.nombre&&(h.subobra||'')===(sub||'')&&h.trabajador===(workerAct||ME));setFormPDF({obraName:obraAct.nombre,subobraName:sub,worker:w,entradas:ents,ops:[]});}

  const FH=()=>(<div className="overlay" onClick={()=>setFormH(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
    <div className="mh"/><div className="mhdr"><span className="mtit">{formH.id?'Editar entrada':'Nueva entrada'}</span><span className="mcls" onClick={()=>setFormH(null)}>✕</span></div>
    <div className="mbody">
      <div className="fr2"><div className="field" style={{marginBottom:0}}><label>Fecha</label><input type="date" className="fi" value={formH.fecha} onChange={e=>setFormH(v=>({...v,fecha:e.target.value}))}/></div><div className="field" style={{marginBottom:0}}><label>Horas</label><input type="number" className="fi" min="0" max="24" step="0.5" value={formH.horas} onChange={e=>setFormH(v=>({...v,horas:e.target.value}))}/></div></div>
      <div style={{height:11}}/>
      <div className="field"><label>Obra *</label><AcInput value={formH.obra} onChange={v=>setFormH(f=>({...f,obra:v}))} suggestions={obraNames} placeholder="Torre Puig, ISDIN, Exea..."/></div>
      <div className="field"><label>Subobra</label><AcInput value={formH.subobra||''} onChange={v=>setFormH(f=>({...f,subobra:v}))} suggestions={subNames} placeholder="Planta 3, HDMI, Leds..."/></div>
      <div className="field"><label>Notas</label><input className="fi" value={formH.notas||''} onChange={e=>setFormH(v=>({...v,notas:e.target.value}))} placeholder="Descripción rápida..."/></div>
      <div className="field"><label>Trabajos <span style={{fontWeight:400,color:'var(--text3)',textTransform:'none'}}>(para PDF)</span></label><textarea className="fi" value={formH.trabajos||''} onChange={e=>setFormH(v=>({...v,trabajos:e.target.value}))} style={{minHeight:52}}/></div>

  </div></div>);

            window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
            setFormPDF(null);
          }}>WhatsApp</button></div>
    </div></div>);
  };

  const [obrasSubtab,setObrasSubtab]=useState('obras');
  const [busqHoras,setBusqHoras]=useState('');

  if(vista==='list'){

      {obrasSubtab==='mhoras'&&(()=>{
        const misHAll=horas.filter(h=>h.trabajador===ME);
        const found=busqHoras.length>1?misHAll.filter(h=>h.obra.toLowerCase().includes(busqHoras.toLowerCase())||(h.subobra||'').toLowerCase().includes(busqHoras.toLowerCase())||(h.notas||'').toLowerCase().includes(busqHoras.toLowerCase())).sort((a,b)=>b.fecha>a.fecha?1:-1).slice(0,40):[];
        return(<div>
          <input className="fi" value={busqHoras} onChange={e=>setBusqHoras(e.target.value)} placeholder="Buscar en mis horas..." style={{marginBottom:10}}/>
          {busqHoras.length<2?<div className="empty"><div className="eico">🔍</div><p>Escribe al menos 2 caracteres</p></div>
            :found.length===0?<div className="empty"><div className="eico">🔍</div><p>Sin resultados</p></div>
            :<div className="card" style={{padding:0}}>{found.map(h=>(<div key={h.id} className="entrada"><div className="ef">{fmtDS(h.fecha)}</div><div className="em"><div className="eo">{h.obra}{h.subobra&&<span style={{color:'var(--text3)'}}> · {h.subobra}</span>}</div>{h.notas&&<div className="es">{h.notas}</div>}</div><div className="eh">{h.horas}h</div></div>))}</div>
          }
        </div>);
      })()}
      {obrasSubtab==='obras'&&(<div>
      <div className="fu" style={{marginBottom:10}}>
        <input className="fi" value={busq} onChange={e=>setBusq(e.target.value)} placeholder="🔍 Buscar obra..." style={{marginBottom:8}}/>
        <div className="row" style={{gap:6}}>
          {['','Activa','Finalizada'].map(f=>(<button key={f} onClick={()=>setFiltroE(f)} style={{padding:'4px 11px',borderRadius:20,fontSize:'.68rem',fontWeight:600,background:filtroE===f?'var(--blue)':'var(--bg3)',color:filtroE===f?'#fff':'var(--text2)',border:`1px solid ${filtroE===f?'var(--blue)':'var(--border)'}`}}>{f||'Todas'}</button>))}
        </div>
      </div>

      {shown.map((og,i)=>(<div key={og.nombre} className={`ocard fu${Math.min(i%4+1,4)}`} onClick={()=>{setObraAct(og);setWorkerAct(null);setVista('obra');}}>

          <div className="oh">{og.totalH.toFixed(0)}h</div>

      </div>))}
      <div className="fab" onClick={()=>setFormH({obra:'',subobra:'',fecha:today(),horas:8,notas:'',trabajos:'',materiales:''})}>+</div>
      {formH&&<FH/>}

    </div>);
  }

    return(<div>
      <button className="btn btng bsm fu" style={{marginBottom:10}} onClick={()=>{setVista('list');setObraAct(null);}}>← Obras</button>
      <div className="card cp fu1">
        <div className="row" style={{marginBottom:8}}>
          <div style={{flex:1}}><div style={{fontSize:'1rem',fontWeight:700}}>{og.nombre}</div><div style={{fontSize:'.7rem',color:'var(--text2)',marginTop:2}}>{og.entradas.length} entradas · {og.totalH.toFixed(0)}h totales</div></div>
          <div className="row" style={{gap:6}}><button className="btn btnp bsm" onClick={()=>setFormH({obra:og.nombre,subobra:'',fecha:today(),horas:8,notas:'',trabajos:'',materiales:''})}>+ Mis horas</button><a href={`https://maps.google.com/?q=${encodeURIComponent(og.nombre+' Barcelona')}`} target="_blank" rel="noreferrer" className="btn btng bsm" style={{textDecoration:'none'}}>📍 Maps</a></div>

      <div className="card fu2" style={{padding:0}}>

          <div style={{flex:1}}><div style={{fontSize:'.82rem',fontWeight:500,color:w===ME?'var(--accent)':undefined}}>{w}{w===ME&&' (yo)'}</div><div style={{fontSize:'.65rem',color:'var(--text3)'}}>{ws.count} entradas</div></div>
          <div style={{fontFamily:'var(--mono)',fontSize:'.9rem',fontWeight:700,color:wcolor(w)}}>{ws.h.toFixed(0)}h</div>
          <span style={{color:'var(--text3)',fontSize:'.8rem'}}>›</span>
        </div>))}
      </div>

      <div className="card fu3" style={{padding:0}}>

                </div>

                  if(f.mimeType==='application/pdf'||f.nombre.toLowerCase().endsWith('.pdf')){

                    w.document.close();

                    const a=document.createElement('a');a.href=f.data;a.download=f.nombre;a.click();

          </div>

        <img src={fotoM.data} style={{maxWidth:'100%',maxHeight:'72vh',borderRadius:'var(--r)',objectFit:'contain'}} alt=""/>
        <button className="btn btnd bsm" style={{position:'absolute',top:8,right:8}} onClick={()=>delFoto(fotoM.id)}>🗑 Eliminar</button>
      </div></div>)}
    </div>);
  }

  if(vista==='worker'&&obraAct&&workerAct){
    const isMe=workerAct===ME;
    const wTotal=subGrps.reduce((s,sg)=>s+sg.totalH,0);
    return(<div>
      <button className="btn btng bsm fu" style={{marginBottom:10}} onClick={()=>setVista('obra')}>← {obraAct.nombre}</button>
      <div className="card cp fu1">
        <div className="row">
          <div className="wavatar" style={{width:36,height:36,fontSize:'.75rem',borderColor:wcolor(workerAct),color:wcolor(workerAct)}}>{initials(workerAct)}</div>
          <div style={{flex:1}}><div style={{fontSize:'.95rem',fontWeight:700,color:isMe?'var(--accent)':undefined}}>{workerAct}{isMe&&' (yo)'}</div><div style={{fontSize:'.7rem',color:'var(--text2)',marginTop:1}}>{obraAct.nombre}</div></div>
          <div style={{fontFamily:'var(--mono)',fontSize:'1.3rem',fontWeight:700,color:wcolor(workerAct)}}>{wTotal.toFixed(0)}h</div>
        </div>
      </div>
      {isMe&&<div style={{marginBottom:8}}><button className="btn btnp bsm" onClick={()=>setFormH({obra:obraAct.nombre,subobra:'',fecha:today(),horas:8,notas:'',trabajos:'',materiales:''})}>+ Añadir horas</button></div>}
      <div className="slabel fu2" style={{marginBottom:7}}>Subobras</div>
      {subGrps.length===0?<div className="empty fu2"><div className="eico">📋</div><p>Sin entradas</p></div>
        :<div className="card fu2" style={{padding:0}}>{subGrps.map(sub=>(<div key={sub.nombre} className="srow" onClick={()=>{setSubobraAct(sub.nombre);setVista('subobra');}}>
