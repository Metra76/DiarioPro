          <div style={{fontFamily:'var(--mono)',fontSize:'.88rem',fontWeight:600,color:wcolor(workerAct)}}>{sub.totalH.toFixed(0)}h</div>
          {isMe&&<button className="btn btng bxs" style={{marginLeft:6}} onClick={e=>{e.stopPropagation();abrirPDF(sub.nombre);}}>PDF</button>}
          <span style={{color:'var(--text3)',fontSize:'.8rem',marginLeft:4}}>›</span>
        </div>))}</div>
      }
      {formH&&<FH/>}
      {formPDF&&<FPDF/>}
    </div>);
  }

  if(vista==='subobra'&&obraAct&&subobraAct!==null){
    const isMe=workerAct===ME;
    const tH=subE.reduce((s,h)=>s+(parseFloat(h.horas)||0),0);
    return(<div>
      <button className="btn btng bsm fu" style={{marginBottom:10}} onClick={()=>{setVista('worker');setSubobraAct(null);setFiltroMes('');}}>← {workerAct}</button>
      <div className="card cp fu1">
        <div className="row">
          <div style={{flex:1}}><div style={{fontSize:'.9rem',fontWeight:700}}>{subobraAct||<span style={{fontStyle:'italic',color:'var(--text2)'}}>Sin subobra</span>}</div><div style={{fontSize:'.7rem',color:'var(--text2)',marginTop:1}}>{obraAct.nombre} · {workerAct}</div></div>
          <div className="col" style={{alignItems:'flex-end',gap:5}}>
            <div style={{fontFamily:'var(--mono)',fontSize:'1.3rem',fontWeight:700,color:wcolor(workerAct)}}>{tH.toFixed(0)}h</div>
            {isMe&&<button className="btn btng bxs" onClick={()=>abrirPDF(subobraAct)}>PDF ↓</button>}
          </div>
        </div>
      </div>
      {mesesSub.length>1&&(<div className="row fu2" style={{gap:5,overflowX:'auto',paddingBottom:4,marginBottom:9}}>
        <button onClick={()=>setFiltroMes('')} style={{whiteSpace:'nowrap',padding:'4px 10px',borderRadius:20,fontSize:'.68rem',fontWeight:600,flexShrink:0,background:!filtroMes?'var(--blue)':'var(--bg3)',color:!filtroMes?'#fff':'var(--text2)',border:`1px solid ${!filtroMes?'var(--blue)':'var(--border)'}`}}>Todo</button>
        {mesesSub.map(m=>(<button key={m} onClick={()=>setFiltroMes(m)} style={{whiteSpace:'nowrap',padding:'4px 10px',borderRadius:20,fontSize:'.68rem',fontWeight:600,flexShrink:0,textTransform:'capitalize',background:filtroMes===m?'var(--blue)':'var(--bg3)',color:filtroMes===m?'#fff':'var(--text2)',border:`1px solid ${filtroMes===m?'var(--blue)':'var(--border)'}`}}>{new Date(m+'-01T12:00:00').toLocaleDateString('es-ES',{month:'short',year:'2-digit'})}</button>))}
      </div>)}
      {subE.length===0?<div className="empty fu2"><div className="eico">📋</div><p>Sin entradas</p></div>
        :<div className="card fu2" style={{padding:0}}>{subE.map(h=>(<div key={h.id} className="entrada" onClick={isMe?()=>setFormH({...h}):undefined} style={{cursor:isMe?'pointer':'default'}}>
          <div className="ef">{fmtDS(h.fecha)}</div>
          <div className="em"><div className="eo">{h.notas||<span style={{color:'var(--text3)',fontStyle:'italic'}}>—</span>}</div>{(h.trabajos||h.materiales)&&<div className="es">{[h.trabajos,h.materiales].filter(Boolean).join(' · ').slice(0,65)}</div>}</div>
          <div className="col" style={{alignItems:'flex-end',gap:4}}>
            <div className="eh" style={{color:wcolor(h.trabajador||workerAct)}}>{h.horas}h</div>
            {isMe&&<button className="btn btng bxs bico" style={{fontSize:'.6rem'}} onClick={e=>{e.stopPropagation();setDel(h.id);}}>🗑</button>}
          </div>
        </div>))}</div>
      }
      {isMe&&<div className="fab" onClick={()=>setFormH({obra:obraAct.nombre,subobra:subobraAct,fecha:today(),horas:8,notas:'',trabajos:'',materiales:''})}>+</div>}
      {formH&&<FH/>}
      {formPDF&&<FPDF/>}
      {del&&<Confirm msg="¿Eliminar esta entrada?" onOk={delH} onCancel={()=>setDel(null)}/>}
    </div>);
  }
  return null;
}

// ── CARNETS ───────────────────────────────────────────────────────────────────
function CarnetsCard({showToast}){
  const [carnets,setCarnets]=useState(()=>LS.get('dp_car',[
    {id:'c1',nombre:'Carnet Electricista',vence:'',aviso:30},
    {id:'c2',nombre:'PRL / Seguridad',vence:'',aviso:30},
  ]));
  const [edit,setEdit]=useState(null);
  function save(){const upd=carnets.map(c=>c.id===edit.id?edit:c);setCarnets(upd);LS.set('dp_car',upd);setEdit(null);showToast('Guardado');}
  function addCarnet(){const nc={id:uid(),nombre:'Nuevo carnet',vence:'',aviso:30};const upd=[...carnets,nc];setCarnets(upd);LS.set('dp_car',upd);setEdit(nc);}
  function delCarnet(id){const upd=carnets.filter(c=>c.id!==id);setCarnets(upd);LS.set('dp_car',upd);}
  function daysLeft(vence){if(!vence)return null;return Math.floor((new Date(vence+'T12:00:00')-new Date(today()+'T12:00:00'))/(1000*60*60*24));}
  return(<div className="card cp fu4">
    <div className="row" style={{marginBottom:10}}><span className="slabel" style={{flex:1}}>Carnets y certificados</span><button className="btn btng bxs" onClick={addCarnet}>+ Añadir</button></div>
    {carnets.map(c=>{const dl=daysLeft(c.vence);const expired=dl!==null&&dl<0;const warning=dl!==null&&dl>=0&&dl<=(c.aviso||30);
      return(<div key={c.id} style={{display:'flex',alignItems:'center',gap:8,padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
        <div style={{flex:1}}><div style={{fontSize:'.8rem',fontWeight:500}}>{c.nombre}</div>
          {c.vence?<div style={{fontSize:'.65rem',marginTop:2,color:expired?'var(--red)':warning?'var(--yellow)':'var(--text3)'}}>{expired?'Caducado':warning?'Caduca en '+dl+' dias':'Vence: '+fmtD(c.vence)}</div>:<div style={{fontSize:'.65rem',color:'var(--text3)',marginTop:2}}>Sin fecha</div>}
        </div>
        <span>{expired?'🔴':warning?'🟡':'🟢'}</span>
        <button className="btn btng bxs bico" onClick={()=>setEdit({...c})}>✏️</button>
        <button className="btn btnd bxs bico" onClick={()=>delCarnet(c.id)}>🗑</button>
      </div>);
    })}
    {edit&&(<div className="overlay ctr" onClick={()=>setEdit(null)}><div className="modal ctr" style={{padding:16}} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:'.88rem',fontWeight:700,marginBottom:12}}>Editar carnet</div>
      <div className="field"><label>Nombre</label><input className="fi" value={edit.nombre} onChange={e=>setEdit(v=>({...v,nombre:e.target.value}))}/></div>
      <div className="field"><label>Fecha vencimiento</label><input type="date" className="fi" value={edit.vence||''} onChange={e=>setEdit(v=>({...v,vence:e.target.value}))}/></div>
      <div className="field"><label>Avisar X dias antes</label><input type="number" className="fi" value={edit.aviso||30} onChange={e=>setEdit(v=>({...v,aviso:+e.target.value}))}/></div>
      <div className="row"><button className="btn btng" style={{flex:1}} onClick={()=>setEdit(null)}>Cancelar</button><button className="btn btnp" style={{flex:1}} onClick={save}>Guardar</button></div>
    </div></div>)}
  </div>);
}

// ── CONFIG ────────────────────────────────────────────────────────────────────
function Config({eventos,tareas,horas,obras,gymDays,notas,setEventos,setTareas,setHoras,setObras,setGymDays,setNotas,showToast}){
  const [notif,setNotif]=useState(()=>typeof Notification!=='undefined'&&Notification.permission==='granted');
  async function activar(){const ok=await reqNotif();setNotif(ok);if(ok)schedDailyReminder();showToast(ok?'Notificaciones activadas ✓':'Permiso denegado');}
  function exportar(){const d={eventos,tareas,horas,obras,gymDays,notas,v:5,at:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`DiarioPro_backup_${today()}.json`;a.click();URL.revokeObjectURL(u);showToast('Backup exportado ✓');}
  function importar(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.eventos){setEventos(d.eventos);LS.set('dp_ev',d.eventos);}if(d.tareas){setTareas(d.tareas);LS.set('dp_tar',d.tareas);}if(d.horas){setHoras(d.horas);LS.set('dp_hor',d.horas);}if(d.obras){setObras(d.obras);LS.set('dp_obs',d.obras);}if(d.gymDays){setGymDays(d.gymDays);LS.set('dp_gym',d.gymDays);}if(d.notas){setNotas(d.notas);LS.set('dp_not',d.notas);}showToast('Datos importados ✓');}catch{showToast('Error al importar');}};r.readAsText(f);}
  const misH=horas.filter(h=>h.trabajador===ME);
  const hMes=(()=>{const m=today().slice(0,7);return misH.filter(h=>h.fecha&&h.fecha.startsWith(m)).reduce((s,h)=>s+(parseFloat(h.horas)||0),0);})();
  return(<div>
    <div className="card cp fu">
      <div className="slabel" style={{marginBottom:9}}>Mis estadísticas</div>
      <div className="stats" style={{marginBottom:12}}>
        <div className="stat"><div className="sv">{misH.length}</div><div className="sl">Entradas</div></div>
        <div className="stat"><div className="sv">{hMes.toFixed(0)}h</div><div className="sl">Este mes</div></div>
        <div className="stat"><div className="sv">{gymDays.length}</div><div className="sl">Días gym</div></div>
      </div>
      {(()=>{
        const year=new Date().getFullYear();
        const meses=Array.from({length:12},(_,i)=>{
          const m=String(i+1).padStart(2,'0');
          const h=misH.filter(e=>e.fecha&&e.fecha.startsWith(`${year}-${m}`)).reduce((s,e)=>s+(parseFloat(e.horas)||0),0);
          return{m:new Date(year,i,1).toLocaleDateString('es-ES',{month:'short'}),h};
        });
        const max=Math.max(...meses.map(m=>m.h),1);
        const total=meses.reduce((s,m)=>s+m.h,0);
        if(total===0)return null;
        return(<div>
          <div className="row" style={{marginBottom:8,justifyContent:'space-between'}}>
            <span className="slabel">Horas {year}</span>
            <span style={{fontFamily:'var(--mono)',fontSize:'.78rem',color:'var(--accent)',fontWeight:600}}>{total.toFixed(0)}h total</span>
          </div>
          <div style={{display:'flex',alignItems:'flex-end',gap:3,height:64}}>
            {meses.map(({m,h})=>(
              <div key={m} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                {h>0&&<div style={{fontSize:'.42rem',color:'var(--text3)',fontFamily:'var(--mono)'}}>{h.toFixed(0)}</div>}
                <div style={{width:'100%',borderRadius:'2px 2px 0 0',background:h>0?'var(--blue3)':'var(--bg4)',height:`${Math.max((h/max)*48,h>0?4:2)}px`,transition:'height .3s'}}/>
                <div style={{fontSize:'.44rem',color:'var(--text3)',textTransform:'capitalize'}}>{m}</div>
              </div>
            ))}
          </div>
        </div>);
      })()}
    </div>
    <div className="card cp fu1"><div className="slabel" style={{marginBottom:9}}>Notificaciones push</div><div className="row" style={{justifyContent:'space-between'}}><div><div style={{fontSize:'.84rem',fontWeight:500}}>{notif?'✅ Activadas':'⛔ Desactivadas'}</div><div style={{fontSize:'.67rem',color:'var(--text3)',marginTop:2}}>Avisos de eventos de la agenda</div></div>{!notif&&<button className="btn btnp bsm" onClick={activar}>Activar</button>}</div></div>
    <div className="card cp fu2"><div className="slabel" style={{marginBottom:9}}>Backup</div><div className="col" style={{gap:8}}><button className="btn btng" style={{width:'100%'}} onClick={exportar}>⬇ Exportar JSON completo</button>
          <button className="btn btng" style={{width:'100%'}} onClick={()=>{
            const misH=horas.filter(h=>h.trabajador===ME);
            const rows=[['Fecha','Obra','Subobra','Horas','Notas'],...misH.map(h=>[h.fecha,h.obra||'',h.subobra||'',h.horas,h.notas||''])];
            const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
            const b=new Blob([csv],{type:'text/csv'});
            const u=URL.createObjectURL(b);const a=document.createElement('a');
            a.href=u;a.download='MisHoras_'+today()+'.csv';a.click();URL.revokeObjectURL(u);
            showToast('CSV exportado ✓');
          }}>⬇ Mis horas en CSV</button><label className="btn btng" style={{width:'100%',cursor:'pointer'}}>⬆ Importar JSON<input type="file" accept=".json" style={{display:'none'}} onChange={importar}/></label></div></div>
    <div className="card cp fu3" style={{textAlign:'center'}}><div style={{fontFamily:'var(--mono)',fontSize:'.7rem',color:'var(--text3)',lineHeight:2}}>Memorias v5.0<br/>Juan (JCM) · Badalona<br/>Grup Ese Dos</div></div>
    <div className="card cp" style={{background:'rgba(26,71,184,0.06)',border:'1px solid var(--borderBlue)'}}>
      <div style={{fontSize:'.72rem',fontWeight:600,marginBottom:6}}>📱 Instalar como app</div>
      <div style={{fontSize:'.68rem',color:'var(--text2)',lineHeight:1.6}}>En Safari: toca <strong>Compartir</strong> → <strong>Añadir a pantalla de inicio</strong> → <strong>Añadir</strong></div>
    </div>
    <CarnetsCard showToast={showToast}/>
  </div>);
}

// ── NOTAS ────────────────────────────────────────────────────────────────────────
function Notas({notas,setNotas,showToast}){
  const [form,setForm]=useState(null);
  const [del,setDel]=useState(null);
  const [busq,setBusq]=useState('');
  const CATS=['General','Material','Teléfono','Medida','Otro'];
  const CCAT={General:'var(--accent)',Material:'var(--yellow)',Teléfono:'var(--green)',Medida:'var(--orange,#fb923c)',Otro:'var(--text3)'};

  const filtered=notas.filter(n=>!busq||n.titulo.toLowerCase().includes(busq.toLowerCase())||n.contenido.toLowerCase().includes(busq.toLowerCase()))
    .sort((a,b)=>b.updatedAt>a.updatedAt?1:-1);

  function save(){
    if(!form?.titulo?.trim()&&!form?.contenido?.trim())return;
    const now=new Date().toISOString();
    let upd;
    if(form.id){upd=notas.map(n=>n.id===form.id?{...form,updatedAt:now}:n);}
    else{upd=[{...form,id:uid(),createdAt:now,updatedAt:now},...notas];}
    setNotas(upd);LS.set('dp_not',upd);setForm(null);showToast('Nota guardada');
  }
  function del2(){const upd=notas.filter(n=>n.id!==del);setNotas(upd);LS.set('dp_not',upd);setDel(null);showToast('Eliminada');}

  return(<div>
    <div className="fu" style={{marginBottom:10}}>
      <input className="fi" value={busq} onChange={e=>setBusq(e.target.value)} placeholder="🔍 Buscar nota..."/>
    </div>
    {filtered.length===0?<div className="empty fu1"><div className="eico">📝</div><p>{busq?'Sin resultados':'Sin notas aún'}</p></div>
      :<div className="fu1">{filtered.map((n,i)=>(<div key={n.id} className={`fu${Math.min(i%4+1,4)}`} style={{background:'var(--card)',border:`1px solid var(--border)`,borderLeft:`3px solid ${CCAT[n.cat]||'var(--accent)'}`,borderRadius:'var(--rs)',padding:'11px 13px',marginBottom:8,cursor:'pointer'}} onClick={()=>setForm({...n})}>
        <div className="row" style={{marginBottom:4}}>
          <div style={{flex:1,fontSize:'.84rem',fontWeight:600}}>{n.titulo||<span style={{color:'var(--text3)',fontStyle:'italic'}}>Sin título</span>}</div>
          <span style={{fontSize:'.6rem',color:CCAT[n.cat]||'var(--accent)',fontWeight:600}}>{n.cat}</span>
          <button className="btn btng bxs" style={{marginLeft:4}} onClick={e=>{e.stopPropagation();const txt=(n.titulo?'*'+n.titulo+'*\n':'')+n.contenido;window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');}}>WA</button>
                  <button className="btn btng bxs bico" style={{marginLeft:4}} onClick={e=>{e.stopPropagation();setDel(n.id);}}>🗑</button>
        </div>
        {n.foto&&<img src={n.foto} style={{width:48,height:48,objectFit:'cover',borderRadius:4,float:'right',marginLeft:8}} alt=""/>}
        {n.contenido&&<div style={{fontSize:'.76rem',color:'var(--text2)',lineHeight:1.4,whiteSpace:'pre-wrap'}}>{n.contenido.slice(0,120)}{n.contenido.length>120?'…':''}</div>}
        <div style={{fontSize:'.6rem',color:'var(--text3)',marginTop:5,fontFamily:'var(--mono)'}}>{fmtD(n.updatedAt?.slice(0,10))}</div>
      </div>))}</div>
    }
    <div className="fab" onClick={()=>setForm({titulo:'',contenido:'',cat:'General'})}>+</div>
    {form&&(<div className="overlay" onClick={()=>setForm(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="mh"/><div className="mhdr"><span className="mtit">{form.id?'Editar nota':'Nueva nota'}</span><span className="mcls" onClick={()=>setForm(null)}>✕</span></div>
      <div className="mbody">
        <div className="field"><label>Título</label><input className="fi" value={form.titulo||''} onChange={e=>setForm(v=>({...v,titulo:e.target.value}))} placeholder="Ej. Referencia cable, teléfono proveedor..."/></div>
        <div className="field"><label>Categoría</label><select className="fi" value={form.cat||'General'} onChange={e=>setForm(v=>({...v,cat:e.target.value}))}>{CATS.map(c=><option key={c}>{c}</option>)}</select></div>
        <div className="field"><label>Contenido</label><textarea className="fi" value={form.contenido||''} onChange={e=>setForm(v=>({...v,contenido:e.target.value}))} placeholder="Escribe aquí... números, medidas, referencias, lo que sea." style={{minHeight:120}}/></div>
        <div className="field"><label>Foto <span style={{fontWeight:400,color:'var(--text3)',textTransform:'none'}}>(opcional)</span></label>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {form.foto&&<img src={form.foto} style={{width:60,height:60,objectFit:'cover',borderRadius:'var(--rs)',border:'1px solid var(--border)'}} alt=""/>}
            <label className="btn btng bsm" style={{cursor:'pointer'}}>📷 {form.foto?'Cambiar':'Añadir foto'}<input type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setForm(v=>({...v,foto:ev.target.result}));r.readAsDataURL(f);}}/></label>
            {form.foto&&<button className="btn btnd bxs" onClick={()=>setForm(v=>({...v,foto:null}))}>Quitar</button>}
          </div>
        </div>
      </div>
      <div className="mfoot"><button className="btn btng" onClick={()=>setForm(null)}>Cancelar</button><button className="btn btnp" onClick={save}>Guardar</button></div>
    </div></div>)}
    {del&&<Confirm msg="¿Eliminar esta nota?" onOk={del2} onCancel={()=>setDel(null)}/>}
  </div>);
}

    </div>
    <div className="tabbar">
      <div className={`tab${home?' on':''}`} onClick={()=>setHome(true)}><span className="tab-ico">🏠</span><span>Hoy</span></div>
      {TABS.map((t,i)=>(<div key={i} className={`tab${!home&&tab===i?' on':''}`} onClick={()=>goTab(i)}><span className="tab-ico">{t.ico}</span><span>{t.lbl}</span></div>))}
    </div>
    {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
  </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
